<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <style id="printMargin">@page { margin: 1in; }</style>
  <style>
    :root {
      --surface: rgba(255, 255, 255, 0.97);
      --line: rgba(17, 17, 17, 0.08);
      --line-strong: rgba(17, 17, 17, 0.16);
      --text: #171717;
      --muted: #707070;
      --sidebar-w: 0px;
      --editor-width: calc(100vw - var(--sidebar-w) - 64px);
      --ui-width: calc(100vw - var(--sidebar-w) - 32px);
      --page-hpad: 56px;
      font-family: "Manrope", "Helvetica Neue", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
      color: var(--text);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      min-height: 100vh;
      display: flex;
    }

    .sidebar-toggle {
      min-width: 30px;
      min-height: 30px;
      padding: 0;
      font-size: 1.1rem;
      line-height: 1;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      border-radius: 6px;
      transition: background 120ms ease, color 120ms ease;
      flex-shrink: 0;
    }
    .sidebar-toggle:hover {
      color: var(--text);
    }

    .sidebar {
      width: 0;
      min-width: 0;
      background: var(--surface);
      border-right: 0 solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 180ms ease, min-width 180ms ease, border-right-width 0ms 180ms;
      flex-shrink: 0;
    }

    .sidebar.open {
      width: 260px;
      min-width: 260px;
      border-right-width: 1px;
      transition: width 180ms ease, min-width 180ms ease, border-right-width 0ms 0ms;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 16px 14px 12px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .sidebar-head strong {
      font-size: 0.9rem;
    }

    .sidebar-actions {
      display: flex;
      gap: 4px;
    }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      align-content: flex-start;
    }

    .note-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
    }

    .note-open {
      flex: 1;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      min-width: 0;
    }

    .note-open:hover,
    .note-open:focus-visible {
      outline: none;
      background: rgba(17, 17, 17, 0.05);
    }

    .note-open.active {
      background: rgba(17, 17, 17, 0.08);
    }

    .note-title {
      display: block;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .note-delete {
      min-width: 30px;
      min-height: 30px;
      flex-shrink: 0;
      color: #d93025;
      font-size: 0.85rem;
      opacity: 0.5;
      transition: opacity 120ms ease;
    }
    .note-delete:hover {
      opacity: 1;
    }

    .note-ctx {
      position: fixed;
      z-index: 50;
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 120px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }
    .note-ctx button {
      display: block;
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
    }
    .note-ctx button:hover {
      background: rgba(17,17,17,0.06);
    }

    .shell {
      flex: 1;
      min-width: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      transition: flex 180ms ease;
    }

    .topbar,
    .page-wrap,
    .status-strip {
      width: var(--ui-width);
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(17, 17, 17, 0.04);
      flex-wrap: wrap;
    }

    .title {
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      font-family: KaTeX_Main, 'Computer Modern', Georgia, serif;
    }
    .title .katex {
      font-size: 1em;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }

    .tool,
    select,
    input[type="color"],
    .finder input,
    .finder button {
      min-height: 30px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      padding: 0 7px;
      font-size: 0.82rem;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    .tool {
      cursor: pointer;
      min-width: 30px;
    }

    select,
    input[type="color"],
    .finder input,
    .finder button {
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 6px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      border: none !important;
      background: transparent !important;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #34c759;
      flex-shrink: 0;
      transition: background 300ms ease;
    }
    .status-dot.saving { background: #ffcc00; }
    .status-dot.error  { background: #ff3b30; }

    .tool:hover,
    .tool:focus-visible,
    select:hover,
    select:focus-visible,
    input[type="color"]:hover,
    input[type="color"]:focus-visible,
    .finder input:focus-visible,
    .finder button:focus-visible,
    .code-runner textarea:focus-visible {
      outline: none;
      border-color: var(--line-strong);
      background: #f4f4f4;
    }

    .tool.active,
    .tool[data-role="primary"] {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }


    .link-popup {
      position: fixed;
      z-index: 300;
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 300px;
    }
    .link-popup[hidden] { display: none; }
    .link-popup input[type="url"],
    .link-popup input[type="text"] {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 8px 12px;
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }
    .link-popup input:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.12);
    }
    .link-popup-row {
      display: flex;
      gap: 6px;
    }
    .link-popup-hint {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .link-preview {
      position: fixed;
      z-index: 300;
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 340px;
    }
    .link-preview[hidden] { display: none; }
    .link-preview-url {
      font-size: 0.82rem;
      color: #1a73e8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .link-preview-frame {
      width: 100%;
      height: 180px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fafafa;
      pointer-events: none;
    }
    .link-preview-row {
      display: flex;
      gap: 6px;
    }
    .link-preview-row .tool {
      font-size: 0.82rem;
      min-height: 30px;
      padding: 0 10px;
    }

    .link-redirect {
      position: fixed;
      z-index: 400;
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 280px;
      max-width: 380px;
      text-align: center;
    }
    .link-redirect[hidden] { display: none; }
    .link-redirect-msg {
      margin: 0;
      font-size: 0.88rem;
      color: var(--text);
    }
    .link-redirect-url {
      font-size: 0.82rem;
      color: #1a73e8;
      word-break: break-all;
      text-decoration: none;
      pointer-events: none;
    }
    .link-redirect-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 6px;
    }
    .link-redirect-row .tool {
      min-height: 32px;
      padding: 0 16px;
      font-size: 0.85rem;
      border-radius: 8px;
    }

    .notes-panel {
      width: var(--ui-width);
      margin: 0 auto;
      padding: 12px 4px 0;
    }

    .notes-panel[hidden] {
      display: none;
    }

    .notes-shell {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
    }

    .notes-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .notes-head strong {
      font-size: 0.92rem;
    }

    .notes-head span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .notes-list {
      display: grid;
      gap: 0;
    }

    .note-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-top: 1px solid rgba(17, 17, 17, 0.05);
    }

    .note-open {
      border: 0;
      background: transparent;
      text-align: left;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .note-open:hover,
    .note-open:focus-visible {
      outline: none;
      background: rgba(17, 17, 17, 0.05);
    }

    .note-open.active {
      background: rgba(17, 17, 17, 0.08);
    }

    .note-title {
      display: block;
      font-weight: 600;
      font-size: 0.92rem;
      color: var(--text);
    }

    .note-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .note-delete {
      min-width: 38px;
    }

    .toolbar {
      width: var(--ui-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 3px;
      padding: 4px 0;
    }

    select {
      padding-right: 20px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: transparent;
      padding-left: 6px;
      font-size: 0.8rem;
    }

    select:hover,
    select:focus-visible {
      outline: none;
      border-color: var(--line-strong);
      background: #f4f4f4;
    }

    .tb-sep {
      width: 1px;
      height: 16px;
      background: var(--line);
      margin: 0 3px;
      flex-shrink: 0;
    }

    .tb-stats {
      font-size: 0.76rem;
      color: var(--muted);
      padding: 0 4px;
      white-space: nowrap;
    }

    .find-input {
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: transparent;
      padding: 0 8px;
      font: inherit;
      font-size: 0.8rem;
      width: 90px;
      color: var(--text);
    }

    .find-input:focus {
      outline: none;
      border-color: var(--line-strong);
      background: #f4f4f4;
    }

    .tool-color {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--line);
      background: transparent;
      transition: border-color 120ms;
    }

    .tool-color:hover {
      border-color: var(--line-strong);
    }

    .tool-color input[type="color"] {
      width: 16px;
      height: 16px;
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      border-radius: 3px;
    }

    .workspace {
      min-height: 0;
    }

    .page-wrap {
      display: flex;
      justify-content: center;
      padding: 0;
      position: relative;
    }

    .margin-guide {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 3px;
      cursor: col-resize;
      z-index: 10;
      border: none;
      background: transparent;
    }
    .margin-guide::before {
      content: '';
      display: block;
      width: 1px;
      height: 100%;
      margin: 0 auto;
      border-left: 1.5px dashed rgba(17,17,17,0.12);
      transition: border-color 200ms;
    }
    .margin-guide:hover::before,
    .margin-guide.dragging::before {
      border-color: rgba(26,115,232,0.5);
      width: 2px;
    }
    .margin-guide-left {
      left: 0;
      transform: translateX(-1px);
    }
    .margin-guide-right {
      right: 0;
      transform: translateX(1px);
    }

    .page {
      width: var(--editor-width);
      min-height: calc(100vh - 76px);
      padding: 28px var(--page-hpad) 96px;
      border: 0;
      outline: none;
      background: transparent;
      box-shadow: none;
      line-height: 1.75;
      font-size: 1.06rem;
      font-weight: 500;
      overflow-wrap: break-word;
    }

    .page a {
      color: #1a73e8;
      text-decoration: underline;
      text-decoration-color: rgba(26,115,232,0.35);
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .page a:hover {
      text-decoration-color: #1a73e8;
    }

    .page h1,
    .page h2,
    .page h3 {
      line-height: 1.12;
      letter-spacing: -0.04em;
      margin-top: 1.3em;
      margin-bottom: 0.35em;
    }

    .page h1 {
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 700;
    }

    .page h2 {
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    .page h3 {
      font-size: clamp(1.45rem, 3vw, 1.9rem);
    }

    .page h1:first-child,
    .page h2:first-child,
    .page h3:first-child,
    .page p:first-child {
      margin-top: 0;
    }

    .page p,
    .page li,
    .page blockquote,
    .page td,
    .page th {
      font-size: 1.06rem;
    }

    .page table {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
    }

    .page th,
    .page td {
      border: 1px solid #191919;
      padding: 10px 12px;
      vertical-align: top;
    }

    /* ── Editable Table Widget ── */
    .table-widget {
      width: 100%;
      margin: 16px 0;
      border: 1px solid var(--line);
      background: var(--surface);
    }
    .table-widget[contenteditable="false"] { cursor: default; }
    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 4px 6px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,17,17,0.02);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .table-head .tool {
      min-height: 24px;
      min-width: auto;
      padding: 0 6px;
      font-size: 0.78rem;
      border-radius: 3px;
    }
    .table-actions { display: flex; gap: 3px; align-items: center; }
    .table-widget table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
    }
    .table-widget th,
    .table-widget td {
      border: 1px solid var(--line);
      padding: 6px 10px;
      font-size: 0.92rem;
      min-width: 48px;
      outline: none;
    }
    .table-widget th { background: rgba(17,17,17,0.03); font-weight: 600; }
    .table-widget td:focus,
    .table-widget th:focus { background: rgba(26,115,232,0.06); }
    .table-widget .table-row-handle {
      width: 24px;
      min-width: 24px;
      padding: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      user-select: none;
      cursor: default;
      background: rgba(17,17,17,0.02);
    }

    .page img {
      max-width: 100%;
      border-radius: 12px;
      margin: 16px 0;
    }

    .page blockquote {
      margin: 18px 0;
      padding: 8px 0 8px 18px;
      border-left: 3px solid #111111;
      color: #2d2d2d;
    }

    .page pre:not(.code-output) {
      padding: 16px;
      background: #111111;
      color: #ffffff;
      border-radius: 14px;
      overflow-x: auto;
    }

    .math-inline,
    .math-block {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 2px 4px;
      cursor: pointer;
      vertical-align: middle;
      color: inherit;
      background-color: inherit;
    }

    .math-inline .katex,
    .math-block .katex,
    .math-inline .katex .katex-html,
    .math-block .katex .katex-html,
    .math-inline .katex .katex-html > .base,
    .math-block .katex .katex-html > .base {
      color: inherit;
    }

    .math-inline:hover,
    .math-block:hover {
      filter: brightness(0.96);
    }

    .math-block {
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 12px 0;
      margin: 8px 0;
    }

    .math-source {
      display: none;
    }

    .math-editor {
      display: inline-block;
      font-family: "Courier New", monospace;
      font-size: 0.92rem;
      border: none;
      border-bottom: 1.5px solid #111;
      outline: none;
      background: transparent;
      color: var(--text);
      min-width: 60px;
      width: auto;
      padding: 0 2px;
      vertical-align: middle;
    }

    .math-editing {
      background: rgba(17,17,17,0.04);
    }

    .math-error {
      color: #8f1d1d;
      font-size: 0.92rem;
      white-space: pre-wrap;
    }

    .math-preview {
      position: fixed;
      z-index: 200;
      background: #ffffff;
      border: 1px solid rgba(17,17,17,0.12);
      border-radius: 12px;
      padding: 10px 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      pointer-events: none;
      max-width: 420px;
      min-height: 40px;
      font-size: 1rem;
    }

    .code-lang-badge {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: "Courier New", monospace;
      padding: 0 4px;
    }

    .code-runner {
      width: 100%;
      margin: 12px 0;
      border: 1px solid var(--line);
      background: var(--surface);
      font-family: "Courier New", monospace;
    }

    .code-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 4px 6px;
      border-bottom: 1px solid var(--line);
      background: rgba(17,17,17,0.02);
    }

    .code-head .tool {
      min-height: 26px;
      min-width: auto;
      padding: 0 8px;
      font-size: 0.8rem;
      border-radius: 3px;
    }

    .code-actions {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .code-input,
    .code-stdin {
      display: block;
      width: 100%;
      padding: 10px 12px;
      resize: vertical;
      font-family: "Courier New", monospace;
      font-size: 0.88rem;
      line-height: 1.55;
      border: none;
      background: transparent;
      outline: none;
      min-height: 100px;
      color: var(--text);
    }

    .code-input:focus,
    .code-stdin:focus {
      outline: none;
    }

    .code-stdin {
      min-height: 48px;
      border-top: 1px dashed var(--line);
      color: var(--muted);
    }

    .code-output,
    .code-preview {
      width: 100%;
      border-top: 1px solid var(--line);
    }

    .code-output {
      padding: 10px 12px;
      font-family: "Courier New", monospace;
      font-size: 0.88rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      min-height: 36px;
      color: var(--text);
      background: transparent;
      border-radius: 0;
    }

    .code-preview {
      min-height: 180px;
      background: #ffffff;
    }

    .hidden {
      display: none !important;
    }



    .status-strip {
      display: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hide-ui .topbar,
    .hide-ui .status-strip,
    .hide-ui .sidebar {
      display: none;
    }

    .export-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: #fff;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      min-width: 160px;
      z-index: 50;
      padding: 4px;
    }
    .export-menu[hidden] { display: none; }
    .export-menu button {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      border-radius: 8px;
      color: var(--text);
    }
    .export-menu button:hover {
      background: #f4f4f4;
    }
    .grammar-opt {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
      white-space: nowrap;
    }
    .grammar-opt:hover { background: #f4f4f4; }
    .grammar-opt input[type="checkbox"] {
      width: 15px; height: 15px; accent-color: #111; margin: 0;
    }
    .export-wrap {
      position: relative;
    }
    .spell-error {
      text-decoration: underline wavy #d93025;
      text-underline-offset: 3px;
    }

    /* Auth screen */
    .auth-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-screen[hidden] { display: none; }
    .auth-card {
      width: 340px;
      padding: 32px 28px;
    }
    .auth-title {
      text-align: center;
      margin-bottom: 20px;
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .auth-tab {
      flex: 1;
      padding: 8px 0;
      border: none;
      background: transparent;
      font: inherit;
      font-size: 0.88rem;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 120ms, border-color 120ms;
    }
    .auth-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .auth-form input {
      height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 120ms;
    }
    .auth-form input:focus {
      border-color: #111;
    }
    .auth-btn {
      height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 120ms;
    }
    .auth-btn.primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .auth-btn.primary:hover { background: #333; }
    .auth-btn.google {
      background: #fff;
      color: var(--text);
    }
    .auth-btn.google:hover { background: #f5f5f5; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .auth-error {
      color: #d93025;
      font-size: 0.82rem;
      padding: 4px 0;
    }
    .auth-error[hidden] { display: none; }
    .user-pill {
      font-size: 0.78rem !important;
      color: var(--muted) !important;
      margin-left: auto;
      flex-shrink: 0;
    }
    .user-email {
      padding: 8px 12px;
      font-size: 0.82rem;
      color: var(--muted);
      word-break: break-all;
    }

    @media (max-width: 900px) {
      :root {
        --editor-width: calc(100vw - var(--sidebar-w) - 24px);
        --ui-width: calc(100vw - var(--sidebar-w) - 16px);
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .topbar-actions {
        justify-content: flex-start;
      }


    }

    @media (max-width: 640px) {
      .page {
        padding: 34px 0 56px;
        font-size: 1rem;
      }

      .page p,
      .page li,
      .page blockquote,
      .page td,
      .page th {
        font-size: 1rem;
      }

      .group {
        width: 100%;
      }
    }

    @media print {
      .topbar,
      .sidebar,
      .status-strip {
        display: none;
      }

      .margin-guide {
        display: none;
      }

      .page {
        width: 100%;
        min-height: auto;
        padding: 0 !important;
        box-shadow: none;
        font-size: 11pt;
        line-height: 1.6;
      }

      .page h1 { font-size: 22pt; }
      .page h2 { font-size: 17pt; }
      .page h3 { font-size: 14pt; }

      .page a {
        color: #1a73e8;
        text-decoration: underline;
      }
      .page a[href]::after {
        content: " (" attr(href) ")";
        font-size: 0.75em;
        color: #666;
        font-style: italic;
      }

      .table-head,
      .code-head {
        display: none;
      }
      .table-widget {
        border: 1px solid #999;
      }
      .table-widget th,
      .table-widget td {
        border: 1px solid #999;
      }

      .link-preview,
      .link-popup,
      .link-redirect,
      #codeDeleteConfirm,
      .export-menu,
      #grammarMenu,
      .auth-screen {
        display: none !important;
      }
      .spell-error {
        text-decoration: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- Auth screen -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-title" id="authTitle"></div>
      <div class="auth-tabs">

        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
  <div class="app" id="app">

    <div class="shell">

            <option value="H3">H3</option>

          <button class="tool" type="button" data-command="bold" title="Bold"><b>B</b></button>

          <button class="tool" type="button" data-command="underline" title="Underline"><u>U</u></button>

          <label class="tool-color" title="Highlight"><input id="highlightColor" type="color" value="#fff2cc" aria-label="Highlight color"></label>

          <span class="tb-sep" aria-hidden="true"></span>

          <span class="tb-sep" aria-hidden="true"></span>
          <input id="findText" type="text" class="find-input" placeholder="Find…" aria-label="Find">
          <input id="replaceText" type="text" class="find-input" placeholder="Replace…" aria-label="Replace">
          <button class="tool" type="button" id="findNext" title="Find next">↓</button>
          <button class="tool" type="button" id="replaceAll" title="Replace all">All</button>
          <span class="tb-sep" aria-hidden="true"></span>
          <button class="tool" type="button" id="loadDocument" title="Import file">Import</button>
          <input id="fileInput" type="file" accept=".html,.htm,.txt" hidden>
          <span class="tb-sep" aria-hidden="true"></span>
          <div class="export-wrap">
            <button class="tool pill" type="button" id="grammarToggle">Aa ▾</button>
            <div class="export-menu" id="grammarMenu" hidden>
              <label class="grammar-opt"><input type="checkbox" id="optAutocorrect" checked> Autocorrect</label>
              <label class="grammar-opt"><input type="checkbox" id="optSpellcheck" checked> Highlight misspelled</label>
              <label class="grammar-opt"><input type="checkbox" id="optAutocap" checked> Auto-capitalize</label>
            </div>
          </div>
          <span class="tb-sep" aria-hidden="true"></span>
          <div class="export-wrap">
            <button class="tool pill" type="button" id="exportToggle">Export ▾</button>
            <div class="export-menu" id="exportMenu" hidden>
              <button type="button" id="exportPdf">Print / PDF</button>
              <button type="button" id="saveHtml">HTML</button>
              <button type="button" id="saveText">Plain Text</button>
            </div>
          </div>
          <span class="tb-sep" aria-hidden="true"></span>
          <span class="tb-stats"><strong id="wordCount">0</strong> words · <span id="charCount">0</span> chars</span>
          <span class="status-dot" id="statusDot" title="Ready"></span>
        </div>
        <div class="export-wrap" style="margin-left:auto;flex-shrink:0">
          <button class="tool pill user-pill" type="button" id="userToggle"></button>
          <div class="export-menu" id="userMenu" hidden>
            <div class="user-email" id="userEmailDisplay"></div>
            <button type="button" id="signOutBtn">Sign out</button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <div class="page-wrap">
          <div class="margin-guide margin-guide-left" id="marginGuideLeft"></div>
          <article id="editor" class="page" contenteditable="true" spellcheck="true">
            <h1>Quick Note</h1>
            <p><br></p>
          </article>
          <div class="margin-guide margin-guide-right" id="marginGuideRight"></div>
        </div>
      </main>

      <div class="status-strip sr-only">
        <span id="docMeta">Unsaved local changes will be preserved automatically.</span>
        <span id="cursorMeta">Editing</span>
      </div>
    </div>
  </div>

  <div class="link-preview" id="linkPreview" hidden>
    <span class="link-preview-url" id="linkPreviewUrl"></span>
    <iframe class="link-preview-frame" id="linkPreviewFrame" sandbox="allow-scripts allow-same-origin" loading="lazy" referrerpolicy="no-referrer"></iframe>
    <div class="link-preview-row">
      <button class="tool" type="button" id="linkPreviewOpen" data-role="primary">Open</button>
      <button class="tool" type="button" id="linkPreviewEdit">Edit</button>
      <button class="tool" type="button" id="linkPreviewCopy">Copy URL</button>
      <button class="tool" type="button" id="linkPreviewClose">✕</button>
    </div>
  </div>

  <div class="link-popup" id="linkPopup" hidden>
    <input type="url" id="linkUrl" placeholder="https://" autocomplete="off" spellcheck="false">
    <input type="text" id="linkDisplayText" placeholder="Display text (optional — blank keeps selection)">
    <span class="link-popup-hint">Click a link to open it</span>
    <div class="link-popup-row">
      <button class="tool" type="button" id="linkConfirm" data-role="primary">Insert</button>
      <button class="tool" type="button" id="linkRemove">Unlink</button>
      <button class="tool" type="button" id="linkCancel">✕</button>
    </div>
  </div>

  <div class="link-redirect" id="linkRedirect" hidden>
    <p class="link-redirect-msg" id="linkRedirectMsg">This will redirect you to</p>
    <a class="link-redirect-url" id="linkRedirectUrl" target="_blank" rel="noopener noreferrer"></a>
    <p class="link-redirect-msg">Are you sure?</p>
    <div class="link-redirect-row">
      <button class="tool" type="button" id="linkRedirectYes" data-role="primary">Yes, open</button>
      <button class="tool" type="button" id="linkRedirectNo">No</button>
    </div>
  </div>

  <div class="link-redirect" id="codeDeleteConfirm" hidden>
    <p class="link-redirect-msg">Delete this code block?</p>
    <div class="link-redirect-row">
      <button class="tool" type="button" id="codeDeleteYes" data-role="primary">Yes, delete</button>
      <button class="tool" type="button" id="codeDeleteNo">No</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://unpkg.com/typo-js@1.2.4/typo.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    // ── Firebase Auth ──────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyA8hsSUvU2K6fgUEZ0CErhjLnoRLNiCnFE",
      authDomain: "quicknote-ece65.firebaseapp.com",
      projectId: "quicknote-ece65",
      storageBucket: "quicknote-ece65.firebasestorage.app",
      messagingSenderId: "783432586715",
      appId: "1:783432586715:web:7d338608152b6a551103fe",
      measurementId: "G-JSWYSEL1D3"
    };
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    const authScreen = document.getElementById("authScreen");
    const authForm = document.getElementById("authForm");
    const authEmail = document.getElementById("authEmail");
    const authPassword = document.getElementById("authPassword");
    const authError = document.getElementById("authError");
    const authSubmit = document.getElementById("authSubmit");
    const tabLogin = document.getElementById("tabLogin");
    const tabSignup = document.getElementById("tabSignup");
    const authTitle = document.getElementById("authTitle");
    let authMode = "login"; // "login" or "signup"

    function showAuthError(msg) {
      authError.textContent = msg;
      authError.removeAttribute("hidden");
    }
    function hideAuthError() {
      authError.setAttribute("hidden", "");
    }

    tabLogin.addEventListener("click", () => {
      authMode = "login";
      tabLogin.classList.add("active");
      tabSignup.classList.remove("active");
      authSubmit.textContent = "Log in";
      authPassword.autocomplete = "current-password";
      hideAuthError();
    });
    tabSignup.addEventListener("click", () => {
      authMode = "signup";
      tabSignup.classList.add("active");
      tabLogin.classList.remove("active");
      authSubmit.textContent = "Sign up";
      authPassword.autocomplete = "new-password";
      hideAuthError();
    });

    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAuthError();
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) return;
      try {
        if (authMode === "signup") {
          await auth.createUserWithEmailAndPassword(email, password);
        } else {
          await auth.signInWithEmailAndPassword(email, password);
        }
      } catch (err) {
        const msg = err.code === "auth/wrong-password" ? "Incorrect password."
          : err.code === "auth/user-not-found" ? "No account with that email."
          : err.code === "auth/email-already-in-use" ? "Email already in use."
          : err.code === "auth/weak-password" ? "Password must be at least 6 characters."
          : err.code === "auth/invalid-email" ? "Invalid email address."
          : err.code === "auth/invalid-credential" ? "Invalid email or password."
          : err.message;
        showAuthError(msg);
      }
    });

    document.getElementById("googleSignIn").addEventListener("click", async () => {
      hideAuthError();
      try {
        await auth.signInWithPopup(googleProvider);
      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") {
          showAuthError(err.message);
        }
      }
    });

    // User menu
    const userToggle = document.getElementById("userToggle");
    const userMenu = document.getElementById("userMenu");
    const userEmailDisplay = document.getElementById("userEmailDisplay");

    userToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      userMenu.toggleAttribute("hidden");
    });
    document.addEventListener("click", (e) => {
      if (!userMenu.hasAttribute("hidden") && !userMenu.contains(e.target)) {
        userMenu.setAttribute("hidden", "");
      }
    });
    document.getElementById("signOutBtn").addEventListener("click", () => {
      userMenu.setAttribute("hidden", "");
      auth.signOut();
    });

    // Auth state observer
    auth.onAuthStateChanged((user) => {
      if (user) {
        authScreen.setAttribute("hidden", "");
        const display = user.email || user.displayName || "User";
        userToggle.textContent = display;
        userToggle.title = display;
        userEmailDisplay.textContent = display;
      } else {
        authScreen.removeAttribute("hidden");
        userToggle.textContent = "";
        authEmail.value = "";
        authPassword.value = "";
        hideAuthError();
      }
    });

    // Render auth title with KaTeX after katex is available
    if (window.katex) {
      katex.render("\\text{Quick}\\;\\text{Note}", authTitle, { throwOnError: false });
    } else {
      authTitle.textContent = "Quick Note";
    }

    const app = document.getElementById("app");
    const editor = document.getElementById("editor");
    const saveStatus = document.getElementById("statusDot");
    const docMeta = document.getElementById("docMeta");
    const cursorMeta = document.getElementById("cursorMeta");
    const wordCount = document.getElementById("wordCount");
    const charCount = document.getElementById("charCount");
    const readTime = document.getElementById("readTime");
    const selectionCount = document.getElementById("selectionCount");
    const fileInput = document.getElementById("fileInput");
    const findText = document.getElementById("findText");
    const replaceText = document.getElementById("replaceText");
    const blockStyle = document.getElementById("blockStyle");
    const textColor = document.getElementById("textColor");
    const highlightColor = document.getElementById("highlightColor");
    const notesPanel = document.getElementById("notesPanel");
    const toggleNotes = document.getElementById("toggleNotes");
    const notesList = document.getElementById("notesList");
    const createNoteButton = document.getElementById("createNote");
    const notesKey = "quick-note-notes";
    const currentNoteKey = "quick-note-current-note";
    const codeWidgetTrigger = "\\code";

    katex.render("\\text{Quick}\\;\\text{Note}", document.getElementById("appTitle"), { throwOnError: false });

    const commandButtons = [...document.querySelectorAll("[data-command]")];
    const stateCommands = [
      "bold",
      "italic",
      "underline",
      "strikeThrough",
      "insertUnorderedList",
      "insertOrderedList"
    ];

    let pyodideLoader = null;
    let pyodideRuntime = null;
    let spellDictionary = null;
    let spellLoader = null;
    let autocorrectTimer = null;
    let autocorrectSequence = 0;
    let notes = [];
    let currentNoteId = null;
    const autocorrectCache = new Map();
    const autocorrectBoundaryKeys = new Set([" ", "Enter"]);

    const autocorrectOverrides = {
      // Common typos
      adn: "and", teh: "the", recieve: "receive", seperate: "separate",
      occured: "occurred", untill: "until", becuase: "because",
      definately: "definitely", wierd: "weird", thier: "their",
      freind: "friend", lenght: "length", widht: "width", heigth: "height",
      beacuse: "because", acheive: "achieve", beleive: "believe",
      calender: "calendar", commited: "committed", concious: "conscious",
      enviroment: "environment", goverment: "government", guarentee: "guarantee",
      happend: "happened", immediatly: "immediately", independant: "independent",
      knowlege: "knowledge", neccessary: "necessary", occassion: "occasion",
      occurance: "occurrence", persistant: "persistent",
      posession: "possession", priveledge: "privilege", pronounciation: "pronunciation",
      publically: "publicly", recomend: "recommend", refered: "referred",
      relevent: "relevant", rythm: "rhythm", succesful: "successful",
      suprise: "surprise", tommorow: "tomorrow", tounge: "tongue",
      truely: "truly", twelth: "twelfth", tyrany: "tyranny",
      useable: "usable", vaccuum: "vacuum",

    function defaultNoteContent(title) {
      const safe = (title || "Quick Note").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      return `<h1>${safe}</h1><p><br></p>`;
    }

    function createNoteRecord(title = "Untitled") {
      const noteId = window.crypto && window.crypto.randomUUID ? window.crypto.randomUUID() : `note-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      return {
        id: noteId,
        title,
        content: defaultNoteContent(title),
        updatedAt: Date.now()
      };
    }

    function persistNotes() {
      localStorage.setItem(notesKey, JSON.stringify(notes));
      localStorage.setItem(currentNoteKey, currentNoteId || "");
    }

    function formatNoteDate(timestamp) {
      return new Date(timestamp).toLocaleString([], {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function noteTitleFromContent(content) {
      const parser = new DOMParser();
      const documentNode = parser.parseFromString(content, "text/html");
      const heading = documentNode.body.querySelector("h1, h2, h3");
      const text = (heading ? heading.textContent : documentNode.body.textContent || "").trim();
      return text.slice(0, 48) || "Untitled";
    }

    function currentNote() {
      return notes.find((note) => note.id === currentNoteId) || null;
    }

    function renderNotesList() {
      notesList.innerHTML = "";
      notes.forEach((note) => {
        const item = document.createElement("div");
        item.className = "note-item";

        const openButton = document.createElement("button");
        openButton.type = "button";
        openButton.className = `note-open${note.id === currentNoteId ? " active" : ""}`;
        openButton.innerHTML = `<span class="note-title">${note.title}</span><span class="note-meta">${formatNoteDate(note.updatedAt)}</span>`;
        openButton.addEventListener("click", () => switchNote(note.id));
        openButton._switchId = note.id;
        openButton.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          showNoteContextMenu(e.clientX, e.clientY, note.id);
        });

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "tool note-delete";
        deleteButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d93025" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        deleteButton.title = "Delete note";
        deleteButton.addEventListener("click", () => deleteNote(note.id));

        item.appendChild(openButton);
        item.appendChild(deleteButton);
        notesList.appendChild(item);
      });
    }

    function initializeNotes() {
      try {
        notes = JSON.parse(localStorage.getItem(notesKey) || "[]");
      } catch {
        notes = [];
      }

      if (!Array.isArray(notes) || notes.length === 0) {
        notes = [createNoteRecord("Note 1")];
      }

      // Seed counter from existing "Note N" titles
      notes.forEach((n) => {
        const m = n.title && n.title.match(/^Note\s+(\d+)$/);
        if (m) noteCounter = Math.max(noteCounter, parseInt(m[1], 10));
      });

      currentNoteId = localStorage.getItem(currentNoteKey) || notes[0].id;
      if (!notes.some((note) => note.id === currentNoteId)) {
        currentNoteId = notes[0].id;
      }

      renderNotesList();
      loadCurrentNote();
    }

    function loadCurrentNote() {
      const note = currentNote();
      if (!note) {
        return;
      }
      editor.innerHTML = note.content || defaultNoteContent(note.title);
      hydrateRichBlocks();
      updateMetrics();
      updateToolbarState();
      persistNotes();
    }

    function saveCurrentNoteContent() {
      const note = currentNote();
      if (!note) {
        return;
      }
      note.content = serializeEditorHTML();
      note.updatedAt = Date.now();
      persistNotes();
      renderNotesList();
    }

    function switchNote(noteId) {
      saveCurrentNoteContent();
      currentNoteId = noteId;
      loadCurrentNote();
      announce("Note loaded");
      focusEditor();
    }

    let noteCounter = 0;
    function nextNoteNumber() {
      noteCounter = Math.max(noteCounter, notes.length);
      return ++noteCounter;
    }

    function createNote() {
      saveCurrentNoteContent();
      const note = createNoteRecord(`Note ${nextNoteNumber()}`);
      notes.unshift(note);
      currentNoteId = note.id;
      renderNotesList();
      loadCurrentNote();
      announce("New note");
      focusEditor();
    }

    // ── Note context menu (right-click) ─────────────────────────────
    let noteCtxEl = null;

    function showNoteContextMenu(x, y, noteId) {
      closeNoteContextMenu();
      const menu = document.createElement("div");
      menu.className = "note-ctx";
      menu.style.left = Math.min(x, window.innerWidth - 140) + "px";
      menu.style.top = Math.min(y, window.innerHeight - 50) + "px";

      const renameBtn = document.createElement("button");
      renameBtn.type = "button";
      renameBtn.textContent = "Rename";
      renameBtn.addEventListener("click", () => {
        closeNoteContextMenu();
        startNoteRename(noteId);
      });
      menu.appendChild(renameBtn);

      document.body.appendChild(menu);
      noteCtxEl = menu;
    }

    function closeNoteContextMenu() {
      if (noteCtxEl) {
        noteCtxEl.remove();
        noteCtxEl = null;
      }
    }

    document.addEventListener("click", (e) => {
      if (noteCtxEl && !noteCtxEl.contains(e.target)) closeNoteContextMenu();
    }, true);
    document.addEventListener("contextmenu", (e) => {
      if (noteCtxEl && !noteCtxEl.contains(e.target)) closeNoteContextMenu();
    }, true);

    function startNoteRename(noteId) {
      const note = notes.find((n) => n.id === noteId);
      if (!note) return;
      const item = [...notesList.querySelectorAll(".note-open")].find(
        (btn) => { const cb = btn._switchId; return cb === noteId; }
      );
      // Fallback: find by matching title text
      const titleEl = item
        ? item.querySelector(".note-title")
        : [...notesList.querySelectorAll(".note-title")].find(
            (el) => el.textContent === note.title
          );
      if (!titleEl) return;

      const input = document.createElement("input");
      input.type = "text";
      input.value = note.title;
      input.className = "note-rename-input";
      input.style.cssText = "width:100%;font:inherit;font-weight:600;font-size:0.88rem;border:1px solid var(--line-strong);border-radius:4px;padding:1px 4px;outline:none;background:#fff;";

      const commit = () => {
        const val = input.value.trim();
        if (val && val !== note.title) {
          note.title = val;
          persistNotes();
        }
        renderNotesList();
      };

      input.addEventListener("blur", commit);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); input.blur(); }
        if (e.key === "Escape") { input.value = note.title; input.blur(); }
      });

      titleEl.replaceWith(input);
      input.focus();
      input.select();
    }

    function deleteNote(noteId) {
      const note = notes.find((entry) => entry.id === noteId);
      if (!note) {
        return;
      }
      const confirmed = window.confirm(`Delete note \"${note.title}\"?`);
      if (!confirmed) {
        return;
      }

      notes = notes.filter((entry) => entry.id !== noteId);
      if (notes.length === 0) {
        notes = [createNoteRecord("Quick Note")];
      }
      if (currentNoteId === noteId) {
        currentNoteId = notes[0].id;
      }
      renderNotesList();
      loadCurrentNote();
      announce("Note deleted");
    }

    function focusEditor() {
      editor.focus({ preventScroll: true });
    }

    function runCommand(command, value = null) {
      focusEditor();
      document.execCommand(command, false, value);
      updateToolbarState();
      updateMetrics();
      queueSave();
    }

    function applyHighlight(color) {
      focusEditor();
      document.execCommand("styleWithCSS", false, true);
      const normalized = color === "transparent" ? "#ffffff" : color;
      const applied = document.execCommand("hiliteColor", false, normalized);
      if (!applied) {
        document.execCommand("backColor", false, normalized);
      }
      updateToolbarState();
      updateMetrics();
      queueSave();
    }

    function queueSave() {
      saveStatus.className = "status-dot saving";
      saveStatus.title = "Saving";
      clearTimeout(queueSave.timer);
      queueSave.timer = window.setTimeout(saveDocument, 250);
    }

    async function loadSpellDictionary() {
      if (spellDictionary) {
        return spellDictionary;
      }
      if (spellLoader) {
        return spellLoader;
      }

      spellLoader = (async () => {
        if (!window.Typo) {
          return null;
        }

        const [affResponse, dicResponse] = await Promise.all([
          fetch("https://cdn.jsdelivr.net/npm/dictionary-en-us/index.aff"),
          fetch("https://cdn.jsdelivr.net/npm/dictionary-en-us/index.dic")
        ]);

        const [affData, dicData] = await Promise.all([
          affResponse.text(),
          dicResponse.text()
        ]);

        spellDictionary = new window.Typo("en_US", affData, dicData, { platform: "any" });
        return spellDictionary;
      })().catch(() => null);

      return spellLoader;
    }

    function serializeEditorHTML() {
      const clone = editor.cloneNode(true);
      clone.querySelectorAll(".code-runner").forEach((widget) => {
        const codeInput = widget.querySelector(".code-input");
        const stdinInput = widget.querySelector(".code-stdin");
        if (codeInput) {
          widget.dataset.code = codeInput.value;
          codeInput.textContent = codeInput.value;
        }
        if (stdinInput) {
          widget.dataset.stdin = stdinInput.value;
          stdinInput.textContent = stdinInput.value;
        }
      });
      return clone.innerHTML;
    }

    function saveDocument() {
      saveCurrentNoteContent();
      const timestamp = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      saveStatus.className = "status-dot";
      saveStatus.title = "Saved";
      docMeta.textContent = `Last autosave at ${timestamp}.`;
    }

    function loadSavedDocument() {
      initializeNotes();
      saveStatus.className = "status-dot";
      saveStatus.title = "Restored";
    }

    function hydrateRichBlocks() {
      editor.querySelectorAll(".math-inline, .math-block").forEach((node) => renderMathWidget(node, false));
      editor.querySelectorAll(".code-runner").forEach((node) => hydrateCodeRunner(node));
      editor.querySelectorAll(".table-widget").forEach((node) => hydrateTableWidget(node));
      ensureMathBlockTrailing();
    }

    function getPlainText() {
      return editor.innerText.replace(/\u00a0/g, " ").trim();
    }

    function updateMetrics() {
      const text = getPlainText();
      const words = text ? text.split(/\s+/).filter(Boolean).length : 0;
      const characters = text.length;
      document.getElementById("wordCount").textContent = words;
      document.getElementById("charCount").textContent = characters;
    }

    function updateToolbarState() {
      stateCommands.forEach((command) => {
        const button = document.querySelector(`[data-command="${command}"]`);
        if (!button) {
          return;
        }

        let active = false;
        try {
          active = document.queryCommandState(command);
        } catch {
          active = false;
        }
        button.classList.toggle("active", active);
      });

      try {
        const currentBlock = document.queryCommandValue("formatBlock").replace(/[<>]/g, "").toUpperCase();
        if (currentBlock) {
          blockStyle.value = currentBlock;
        }
      } catch {
        blockStyle.value = "P";
      }
    }

    function sanitizeFileName(name) {
      return (name || "quick-note")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "quick-note";
    }

    function currentTitle() {
      const firstHeading = editor.querySelector("h1, h2, h3");
      return sanitizeFileName(firstHeading ? firstHeading.textContent : "quick-note");
    }

    function downloadFile(content, extension, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${currentTitle()}.${extension}`;
      link.click();
      URL.revokeObjectURL(url);
      saveStatus.className = "status-dot";
      saveStatus.title = `Exported ${extension.toUpperCase()}`;
    }

    function createTableMarkup(rows, cols) {
      const bodyRows = Array.from({ length: rows }, (_, rowIndex) => {
        const tag = rowIndex === 0 ? "th" : "td";
        const cells = Array.from({ length: cols }, (_, colIndex) => `<${tag}>${rowIndex === 0 ? `Header ${colIndex + 1}` : `Cell ${rowIndex}.${colIndex + 1}`}</${tag}>`).join("");
        return `<tr>${cells}</tr>`;
      }).join("");
      return `<table><tbody>${bodyRows}</tbody></table><p></p>`;
    }

    // ── Interactive Table Widget ──────────────────────────────────────────
    function createTableWidget(rows = 3, cols = 3) {
      const container = document.createElement("div");
      container.className = "table-widget";
      container.contentEditable = "false";

      const head = document.createElement("div");
      head.className = "table-head";
      head.innerHTML = `<span>Table</span>
        <div class="table-actions">
          <button class="tool tw-add-col" type="button" title="Add column">+Col</button>
          <button class="tool tw-add-row" type="button" title="Add row">+Row</button>
          <button class="tool tw-del-col" type="button" title="Delete last column">\u2212Col</button>
          <button class="tool tw-del-row" type="button" title="Delete last row">\u2212Row</button>
          <button class="tool tw-remove" type="button" title="Remove table">\u2715</button>
        </div>`;
      container.appendChild(head);

      const table = document.createElement("table");
      const tbody = document.createElement("tbody");
      for (let r = 0; r < rows; r++) {
        const tr = document.createElement("tr");
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement(r === 0 ? "th" : "td");
          cell.contentEditable = "true";
          cell.textContent = r === 0 ? `Col ${c + 1}` : "";
          tr.appendChild(cell);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      container.appendChild(table);

      // After a short delay, add the trailing paragraph for continued editing
      const trailing = document.createElement("p");
      trailing.innerHTML = "<br>";

      hydrateTableWidget(container);
      return { widget: container, trailing };
    }

    function hydrateTableWidget(container) {
      if (container.dataset.hydrated === "true") return;
      container.dataset.hydrated = "true";

      const getTable = () => container.querySelector("table");
      const getTbody = () => container.querySelector("tbody");

      container.querySelector(".tw-add-col").addEventListener("click", () => {
        const tbody = getTbody();
        if (!tbody) return;
        tbody.querySelectorAll("tr").forEach((tr, ri) => {
          const cell = document.createElement(ri === 0 ? "th" : "td");
          cell.contentEditable = "true";
          cell.textContent = ri === 0 ? `Col ${tr.children.length + 1}` : "";
          tr.appendChild(cell);
        });
        queueSave();
      });

      container.querySelector(".tw-add-row").addEventListener("click", () => {
        const tbody = getTbody();
        if (!tbody) return;
        const colCount = tbody.rows[0] ? tbody.rows[0].cells.length : 3;
        const tr = document.createElement("tr");
        for (let c = 0; c < colCount; c++) {
          const td = document.createElement("td");
          td.contentEditable = "true";
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
        tr.cells[0].focus();
        queueSave();
      });

      container.querySelector(".tw-del-col").addEventListener("click", () => {
        const tbody = getTbody();
        if (!tbody) return;
        const cols = tbody.rows[0] ? tbody.rows[0].cells.length : 0;
        if (cols <= 1) return;
        tbody.querySelectorAll("tr").forEach(tr => {
          if (tr.lastElementChild) tr.lastElementChild.remove();
        });
        queueSave();
      });

      container.querySelector(".tw-del-row").addEventListener("click", () => {
        const tbody = getTbody();
        if (!tbody || tbody.rows.length <= 1) return;
        tbody.lastElementChild.remove();
        queueSave();
      });

      container.querySelector(".tw-remove").addEventListener("click", () => {
        container.nextElementSibling; // trailing <p>
        container.remove();
        focusEditor();
        queueSave();
      });

      // Tab between cells
      container.addEventListener("keydown", e => {
        if (e.key === "Tab") {
          e.preventDefault();
          const cell = e.target.closest("td, th");
          if (!cell) return;
          const allCells = [...container.querySelectorAll("td, th")];
          const idx = allCells.indexOf(cell);
          const next = allCells[e.shiftKey ? idx - 1 : idx + 1];
          if (next) { next.focus(); selectAllInNode(next); }
        }
      });
    }

    function selectAllInNode(node) {
      const range = document.createRange();
      range.selectNodeContents(node);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    // ── Typst → LaTeX preprocessor ─────────────────────────────────────
    // Converts common Typst-style math shorthands to LaTeX before KaTeX rendering.
    function typstToLatex(input) {
      let s = input;

      // Function-call syntax: name(args) → \name{args}
      // Must handle nested parens and multiple comma-separated args

      // frac(a, b) → \frac{a}{b}
      s = s.replace(/\bfrac\(([^,]+),\s*([^)]+)\)/g, "\\frac{$1}{$2}");

      // sqrt(x) → \sqrt{x}
      s = s.replace(/\bsqrt\(([^)]+)\)/g, "\\sqrt{$1}");

      // root(n, x) → \sqrt[n]{x}
      s = s.replace(/\broot\(([^,]+),\s*([^)]+)\)/g, "\\sqrt[$1]{$2}");

      // binom(n, k) → \binom{n}{k}
      s = s.replace(/\bbinom\(([^,]+),\s*([^)]+)\)/g, "\\binom{$1}{$2}");

      // mat(...; ...) → \begin{pmatrix}...\end{pmatrix}
      s = s.replace(/\bmat\(([^)]+)\)/g, (_, body) => {
        const rows = body.split(";").map(row =>
          row.trim().split(",").map(c => c.trim()).join(" & ")
        ).join(" \\\\ ");
        return `\\begin{pmatrix} ${rows} \\end{pmatrix}`;
      });

      // vec(a, b, c) → column vector
      s = s.replace(/\bvec\(([^)]+)\)/g, (_, body) => {
        if (body.includes(",")) {
          const entries = body.split(",").map(c => c.trim()).join(" \\\\ ");
          return `\\begin{pmatrix} ${entries} \\end{pmatrix}`;
        }
        return `\\vec{${body.trim()}}`;
      });

      // cases(expr1 "if" cond1, expr2 "if" cond2) → \begin{cases}...\end{cases}
      s = s.replace(/\bcases\(([^)]+)\)/g, (_, body) => {
        const rows = body.split(",").map(row => row.trim()).join(" \\\\ ");
        return `\\begin{cases} ${rows} \\end{cases}`;
      });

      // cancel(x) → \cancel{x}
      s = s.replace(/\bcancel\(([^)]+)\)/g, "\\cancel{$1}");

      // abs(x) → \left|x\right|
      s = s.replace(/\babs\(([^)]+)\)/g, "\\left|$1\\right|");

      // norm(x) → \left\|x\right\|
      s = s.replace(/\bnorm\(([^)]+)\)/g, "\\left\\|$1\\right\\|");

      // floor(x) → \left\lfloor x\right\rfloor
      s = s.replace(/\bfloor\(([^)]+)\)/g, "\\left\\lfloor $1\\right\\rfloor");

      // ceil(x) → \left\lceil x\right\rceil
      s = s.replace(/\bceil\(([^)]+)\)/g, "\\left\\lceil $1\\right\\rceil");

      // Style variants
      s = s.replace(/\bbold\(([^)]+)\)/g, "\\mathbf{$1}");
      s = s.replace(/\bitalic\(([^)]+)\)/g, "\\mathit{$1}");
      s = s.replace(/\bupright\(([^)]+)\)/g, "\\mathrm{$1}");
      s = s.replace(/\bcal\(([^)]+)\)/g, "\\mathcal{$1}");
      s = s.replace(/\bbb\(([^)]+)\)/g, "\\mathbb{$1}");
      s = s.replace(/\bfrak\(([^)]+)\)/g, "\\mathfrak{$1}");
      s = s.replace(/\bmono\(([^)]+)\)/g, "\\mathtt{$1}");
      s = s.replace(/\bsans\(([^)]+)\)/g, "\\mathsf{$1}");
      s = s.replace(/\bserif\(([^)]+)\)/g, "\\mathrm{$1}");

      // Accents
      s = s.replace(/\bhat\(([^)]+)\)/g, "\\hat{$1}");
      s = s.replace(/\btilde\(([^)]+)\)/g, "\\tilde{$1}");
      s = s.replace(/\bdot\(([^)]+)\)/g, "\\dot{$1}");
      s = s.replace(/\bddot\(([^)]+)\)/g, "\\ddot{$1}");
      s = s.replace(/\bbar\(([^)]+)\)/g, "\\bar{$1}");
      s = s.replace(/\bacute\(([^)]+)\)/g, "\\acute{$1}");
      s = s.replace(/\bgrave\(([^)]+)\)/g, "\\grave{$1}");
      s = s.replace(/\bbreve\(([^)]+)\)/g, "\\breve{$1}");

      // Over/under
      s = s.replace(/\boverbrace\(([^,]+),\s*([^)]+)\)/g, "\\overbrace{$1}^{$2}");
      s = s.replace(/\bunderbrace\(([^,]+),\s*([^)]+)\)/g, "\\underbrace{$1}_{$2}");
      s = s.replace(/\boverline\(([^)]+)\)/g, "\\overline{$1}");
      s = s.replace(/\bunderline\(([^)]+)\)/g, "\\underline{$1}");

      // op("name") → \operatorname{name}
      s = s.replace(/\bop\("([^"]+)"\)/g, "\\operatorname{$1}");

      // Typst Greek (bare words) → LaTeX \commands — only common ones
      const greekMap = [
        "alpha","beta","gamma","delta","epsilon","zeta","eta","theta","iota",
        "kappa","lambda","mu","nu","xi","pi","rho","sigma","tau","upsilon",
        "phi","chi","psi","omega",
        "Gamma","Delta","Theta","Lambda","Xi","Pi","Sigma","Upsilon","Phi","Psi","Omega"
      ];
      for (const g of greekMap) {
        s = s.replace(new RegExp(`(?<!\\\\)\\b${g}\\b`, "g"), `\\${g}`);
      }

      // Common symbol names
      const symbolMap = {
        "infinity": "\\infty", "partial": "\\partial", "nabla": "\\nabla",
        "forall": "\\forall", "exists": "\\exists", "emptyset": "\\emptyset",
        "approx": "\\approx", "equiv": "\\equiv", "prop": "\\propto",
        "arrow.r": "\\rightarrow", "arrow.l": "\\leftarrow",
        "arrow.r.double": "\\Rightarrow", "arrow.l.double": "\\Leftarrow",
        "arrow.l.r": "\\leftrightarrow", "arrow.r.long": "\\longrightarrow",
        "arrow.r.bar": "\\mapsto",
        "times": "\\times", "div": "\\div",
        "plus.minus": "\\pm", "minus.plus": "\\mp",
        "dots": "\\dots", "dots.h": "\\cdots", "dots.v": "\\vdots", "dots.down": "\\ddots",
        "star.op": "\\star",
        "circle.plus": "\\oplus", "circle.times": "\\otimes",
        "union": "\\cup", "sect": "\\cap",
        "subset": "\\subset", "supset": "\\supset",
        "subset.eq": "\\subseteq", "supset.eq": "\\supseteq",
        "in.not": "\\notin",
        "tack.r": "\\vdash", "models": "\\models",
        "ell": "\\ell", "aleph": "\\aleph", "dagger": "\\dagger",
        "integral": "\\int", "integral.double": "\\iint", "integral.triple": "\\iiint",
        "integral.cont": "\\oint",
        "sum": "\\sum", "product": "\\prod",
      };
      for (const [k, v] of Object.entries(symbolMap)) {
        // Escape dots for regex
        const escaped = k.replace(/\./g, "\\.");
        s = s.replace(new RegExp(`(?<!\\\\)\\b${escaped}\\b`, "g"), v);
      }

      return s;
    }

    // Math shortcut triggers: type $\trigger$ to insert a pre-filled math template
    const mathTemplates = {
      "\\\\table": null, // handled specially (table widget)
      "\\\\matrix": "\\begin{pmatrix}  &  \\\\  &  \\end{pmatrix}",
      "\\\\bmatrix": "\\begin{bmatrix}  &  \\\\  &  \\end{bmatrix}",
      "\\\\vmatrix": "\\begin{vmatrix}  &  \\\\  &  \\end{vmatrix}",
      "\\\\cases": "\\begin{cases}  & \\text{if }  \\\\  & \\text{otherwise} \\end{cases}",
      "\\\\align": "\\begin{aligned}  &=  \\\\  &=  \\end{aligned}",
      "\\\\sum": "\\sum_{i=0}^{n} ",
      "\\\\prod": "\\prod_{i=1}^{n} ",
      "\\\\int": "\\int_{a}^{b}  \\, dx",
      "\\\\iint": "\\iint_{D}  \\, dA",
      "\\\\lim": "\\lim_{x \\to \\infty} ",
      "\\\\frac": "\\frac{}{}",
      "\\\\binom": "\\binom{n}{k}",
      "\\\\sqrt": "\\sqrt{}",
    };

    function insertHtml(html) {
      focusEditor();
      document.execCommand("insertHTML", false, html);
      hydrateRichBlocks();
      updateMetrics();
      queueSave();
    }

    function replaceAllText(findValue, replaceValue) {
      if (!findValue) {
        return 0;
      }

      const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
      let replaced = 0;

      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (!node.nodeValue.includes(findValue)) {
          continue;
        }
        const matches = node.nodeValue.split(findValue).length - 1;
        node.nodeValue = node.nodeValue.split(findValue).join(replaceValue);
        replaced += matches;
      }

      return replaced;
    }

    function announce(message) {
      saveStatus.title = message;
    }

    function runWhenIdle(callback, timeout = 300) {
      if (typeof window.requestIdleCallback === "function") {
        window.requestIdleCallback(callback, { timeout });
        return;
      }
      window.setTimeout(() => callback({ didTimeout: false, timeRemaining: () => 0 }), timeout);
    }

    function cancelScheduledAutocorrect() {
      autocorrectSequence += 1;
      if (autocorrectTimer) {
        window.clearTimeout(autocorrectTimer);
        autocorrectTimer = null;
      }
    }

    function scheduleAutocorrect() {
      const requestId = ++autocorrectSequence;
      if (autocorrectTimer) {
        window.clearTimeout(autocorrectTimer);
      }

      autocorrectTimer = window.setTimeout(() => {
        autocorrectTimer = null;
        runWhenIdle(() => {
          autocorrectLastWord(requestId);
        }, 450);
      }, 180);
    }

    function getEditingContainer(node) {
      let current = node;
      while (current && current !== editor) {
        if (current.nodeType === Node.ELEMENT_NODE) {
          if (current.classList.contains("code-runner") || current.classList.contains("math-inline") || current.classList.contains("math-block") || current.classList.contains("table-widget") || current.nodeName === "PRE") {
            return current;
          }
        }
        current = current.parentNode;
      }
      return null;
    }

    function extractWordBeforeCursor() {
      const range = getActiveRange();
      if (!range || !range.collapsed) {
        return null;
      }

      let node = range.startContainer;
      let offset = range.startOffset;

      if (node.nodeType !== Node.TEXT_NODE) {
        if (offset > 0) {
          const prior = node.childNodes[offset - 1];
          if (prior && prior.nodeType === Node.TEXT_NODE) {
            node = prior;
            offset = prior.nodeValue.length;
          } else {
            return null;
          }
        } else {
          return null;
        }
      }

      if (getEditingContainer(node.parentNode)) {
        return null;
      }

      const textBefore = node.nodeValue.slice(0, offset);
      const cursorContext = textBefore.match(/([A-Za-z][A-Za-z'’-]{2,})(?=[\s.,!?;:]?$)/);
      if (!cursorContext) {
        return null;
      }

      const word = cursorContext[1];
      const start = textBefore.lastIndexOf(word);
      const block = getCurrentBlock(node.parentNode);
      const blockPrefix = block ? block.textContent.slice(0, block.textContent.lastIndexOf(word) + word.length) : "";
      const dollarCount = (blockPrefix.match(/\$/g) || []).length;

      if (dollarCount % 2 === 1 || autocorrectOverrides[word.toLowerCase()] === word || word.startsWith("\\")) {
        return null;
      }

      return { node, word, start, end: start + word.length };
    }

    function editDistance(a, b) {
      const m = a.length, n = b.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
        }
      }
      return dp[m][n];
    }

    function pickBestSuggestion(word, suggestions) {
      if (!suggestions || suggestions.length === 0) return null;
      let best = suggestions[0], bestDist = editDistance(word, suggestions[0].toLowerCase());
      for (let i = 1; i < suggestions.length; i++) {
        const d = editDistance(word, suggestions[i].toLowerCase());
        if (d < bestDist) { best = suggestions[i]; bestDist = d; }
      }
      // Reject if edit distance is too large relative to word length
      if (bestDist > Math.max(2, Math.ceil(word.length * 0.4))) return null;
      return best;
    }

    function preserveCase(source, replacement) {
      if (source === source.toUpperCase()) {
        return replacement.toUpperCase();
      }
      if (source[0] === source[0].toUpperCase() && source.slice(1) === source.slice(1).toLowerCase()) {
        return replacement[0].toUpperCase() + replacement.slice(1);
      }
      return replacement;
    }

    async function autocorrectLastWord(requestId = autocorrectSequence) {
      if (!writingPrefs.autocorrect) return;
      const context = extractWordBeforeCursor();
      if (!context || requestId !== autocorrectSequence) {
        return;
      }

      const originalWord = context.word;
      const normalizedWord = originalWord.toLowerCase();
      if (autocorrectSkip.has(normalizedWord)) return;
      let replacement = autocorrectOverrides[normalizedWord] || null;

      if (!replacement) {
        const cachedSuggestion = autocorrectCache.get(normalizedWord);
        if (cachedSuggestion === false) {
          return;
        }
        if (typeof cachedSuggestion === "string") {
          replacement = cachedSuggestion;
        }
      }

      if (!replacement) {
        const dictionary = await loadSpellDictionary();
        if (!dictionary || requestId !== autocorrectSequence) {
          return;
        }

        if (dictionary.check(originalWord) || dictionary.check(normalizedWord)) {
          autocorrectCache.set(normalizedWord, false);
          return;
        }

        const suggestions = dictionary.suggest(normalizedWord, 5);
        if (!suggestions || suggestions.length === 0) {
          autocorrectCache.set(normalizedWord, false);
          return;
        }

        // Pick closest suggestion by edit distance
        replacement = pickBestSuggestion(normalizedWord, suggestions);
        autocorrectCache.set(normalizedWord, replacement || false);
      }

      if (!replacement || replacement.toLowerCase() === normalizedWord) {
        return;
      }

      const latestContext = extractWordBeforeCursor();
      if (!latestContext || requestId !== autocorrectSequence) {
        return;
      }
      if (latestContext.node !== context.node || latestContext.start !== context.start || latestContext.word !== originalWord) {
        return;
      }

      const corrected = preserveCase(originalWord, replacement);
      latestContext.node.nodeValue = `${latestContext.node.nodeValue.slice(0, latestContext.start)}${corrected}${latestContext.node.nodeValue.slice(latestContext.end)}`;

      const selection = window.getSelection();
      const range = document.createRange();
      const nextOffset = latestContext.start + corrected.length + 1;
      range.setStart(latestContext.node, Math.min(nextOffset, latestContext.node.nodeValue.length));
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);

      updateMetrics();
      queueSave();
    }

    function getActiveRange() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) {
        return null;
      }
      return selection.getRangeAt(0);
    }

    function placeCaretAfter(node) {
      const range = document.createRange();
      range.setStartAfter(node);
      range.collapse(true);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      focusEditor();
    }

    function replaceTextInNode(node, start, end, replacementNode) {
      const text = node.nodeValue;
      const before = text.slice(0, start);
      const after = text.slice(end);
      const fragment = document.createDocumentFragment();

      if (before) {
        fragment.appendChild(document.createTextNode(before));
      }

      fragment.appendChild(replacementNode);

      if (after) {
        fragment.appendChild(document.createTextNode(after));
      }

      const parent = node.parentNode;
      parent.replaceChild(fragment, node);
      placeCaretAfter(replacementNode);
      queueSave();
      updateMetrics();
    }

    function renderMathWidget(widget, shouldQueueSave = true) {
      const source = widget.dataset.latex || "";
      widget.innerHTML = "";
      const renderHost = document.createElement("span");
      renderHost.className = "math-render";
      const sourceNode = document.createElement("span");
      sourceNode.className = "math-source";
      sourceNode.textContent = source;
      widget.appendChild(renderHost);
      widget.appendChild(sourceNode);

      if (window.katex) {
        try {
          window.katex.render(typstToLatex(source), renderHost, {
            throwOnError: true,
            displayMode: widget.classList.contains("math-block")
          });
        } catch (error) {
          renderHost.innerHTML = `<span class="math-error">${error.message}</span>`;
        }
      } else {
        renderHost.textContent = source;
      }

      widget.contentEditable = "false";
      widget.title = "Click to edit";
      if (!widget.dataset.bound) {
        widget.addEventListener("click", (e) => {
          if (widget.classList.contains("math-editing")) return;
          e.stopPropagation();
          widget.classList.add("math-editing");

          const input = document.createElement("input");
          input.type = "text";
          input.className = "math-editor";
          input.value = widget.dataset.latex || "";
          // Size input to content
          input.style.width = Math.max(60, input.value.length * 9 + 20) + "px";
          input.addEventListener("input", () => {
            input.style.width = Math.max(60, input.value.length * 9 + 20) + "px";
          });

          widget.innerHTML = "";
          widget.appendChild(input);
          input.focus();
          input.select();

          function ensureTrailingParagraph() {
            // For display math (div), make sure there's a paragraph after it to land in
            if (widget.nodeName === "DIV") {
              let next = widget.nextSibling;
              while (next && next.nodeType === Node.TEXT_NODE && !next.nodeValue.trim()) next = next.nextSibling;
              if (!next || (next.nodeType === Node.ELEMENT_NODE && (next.classList.contains("math-block") || next.classList.contains("code-runner")))) {
                const p = document.createElement("p");
                p.innerHTML = "<br>";
                widget.parentNode.insertBefore(p, widget.nextSibling);
              }
            }
          }

          const commit = (exitAfter = false) => {
            const val = input.value.trim();
            widget.dataset.latex = val || widget.dataset.latex || "";
            widget.classList.remove("math-editing");
            renderMathWidget(widget);
            if (exitAfter) {
              ensureTrailingParagraph();
              placeCaretAfter(widget);
            }
          };

          input.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter") { ev.preventDefault(); commit(true); }
            if (ev.key === "Escape") { widget.classList.remove("math-editing"); renderMathWidget(widget); placeCaretAfter(widget); ensureTrailingParagraph(); }
            ev.stopPropagation();
          });
          input.addEventListener("blur", () => commit(false), { once: true });
        });
        widget.dataset.bound = "true";
      }

      if (shouldQueueSave) {
        queueSave();
      }
    }

    function createMathWidget(latex, displayMode) {
      const widget = document.createElement(displayMode ? "div" : "span");
      widget.className = displayMode ? "math-block" : "math-inline";
      widget.dataset.latex = latex;
      renderMathWidget(widget, false);
      return widget;
    }

    // Ensure display-mode math blocks always have a following paragraph
    function ensureMathBlockTrailing() {
      editor.querySelectorAll(".math-block").forEach((mb) => {
        let next = mb.nextSibling;
        while (next && next.nodeType === Node.TEXT_NODE && !next.nodeValue.trim()) next = next.nextSibling;
        if (!next) {
          const p = document.createElement("p");
          p.innerHTML = "<br>";
          mb.parentNode.insertBefore(p, mb.nextSibling);
        }
      });
    }


    function getCurrentBlock(node) {
      let current = node;
      while (current && current !== editor) {
        if (["P", "DIV", "LI", "BLOCKQUOTE", "H1", "H2", "H3", "H4", "H5", "H6"].includes(current.nodeName)) {
          return current;
        }
        current = current.parentNode;
      }
      return null;
    }

    function replaceNode(target, replacement) {
      target.parentNode.replaceChild(replacement, target);
      placeCaretAfter(replacement);
