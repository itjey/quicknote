      hydrateRichBlocks();
      queueSave();
      updateMetrics();
    }

    // Returns an existing or newly created fixed math preview element.
    function getMathPreviewEl() {
      if (!getMathPreviewEl._el) {
        const el = document.createElement("div");
        el.className = "math-preview";
        el.hidden = true;
        document.body.appendChild(el);
        getMathPreviewEl._el = el;
      }
      return getMathPreviewEl._el;
    }

    function hideMathPreview() {
      getMathPreviewEl().hidden = true;
    }

    // Renders a live KaTeX preview tooltip while the user is inside $...$ or $$...$$.
    function updateMathPreview() {
      const preview = getMathPreviewEl();
      const range = getActiveRange();
      if (!range || !range.collapsed || range.startContainer.nodeType !== Node.TEXT_NODE) {
        preview.hidden = true;
        return;
      }
      const textBefore = range.startContainer.nodeValue.slice(0, range.startOffset);
      const displayOpen = textBefore.match(/\$\$([\s\S]*)$/);
      const inlineOpen = !displayOpen && textBefore.match(/(?<!\$)\$([^$\n]*)$/);
      const partial = displayOpen ? displayOpen[1] : (inlineOpen ? inlineOpen[1] : null);
      if (partial === null) {
        preview.hidden = true;
        return;
      }
      const cursorRect = range.getBoundingClientRect();
      preview.style.left = Math.max(8, cursorRect.left) + "px";
      preview.style.top = (cursorRect.bottom + 8) + "px";
      preview.hidden = false;
      if (window.katex) {
        try {
          window.katex.render(typstToLatex(partial.trim()) || "\\square", preview, {
            throwOnError: false,
            displayMode: !!displayOpen
          });
        } catch {
          preview.textContent = partial || "…";
        }
      } else {
        preview.textContent = partial || "…";
      }
    }

    // Detects when the user has just closed $...$ or $$...$$ by typing the closing $ and renders it.
    function checkAndRenderMath() {
      const range = getActiveRange();
      if (!range || !range.collapsed) {
        return;
      }
      const node = range.startContainer;
      if (node.nodeType !== Node.TEXT_NODE) {
        return;
      }
      const offset = range.startOffset;
      const textBefore = node.nodeValue.slice(0, offset);

      // Check for template triggers first ($\trigger$)
      const triggerMatch = textBefore.match(/\$(\\\w+)\$$/);
      if (triggerMatch) {
        const trigger = triggerMatch[1];
        // Escape backslash for lookup in mathTemplates
        const key = trigger.replace(/\\/g, "\\\\");
        if (key in mathTemplates) {
          const block = getCurrentBlock(node.parentNode);
          const start = textBefore.length - triggerMatch[0].length;

          if (trigger === "\\table") {
            // Insert an interactive table widget
            const { widget, trailing } = createTableWidget(3, 3);
            if (block && block.textContent.trim() === triggerMatch[0]) {
              block.parentNode.insertBefore(trailing, block.nextSibling);
              replaceNode(block, widget);
            } else {
              replaceTextInNode(node, start, offset, widget);
              widget.parentNode.insertBefore(trailing, widget.nextSibling);
            }
            hideMathPreview();
            queueSave();
            return;
          }

          const template = mathTemplates[key];
          if (template) {
            // Insert a math widget pre-filled with the template
            const displayMode = block && block.textContent.trim() === triggerMatch[0];
            const mathWidget = createMathWidget(template, displayMode);
            if (displayMode) {
              replaceNode(block, mathWidget);
            } else {
              replaceTextInNode(node, start, offset, mathWidget);
            }
            hideMathPreview();
            // Auto-open editor
            setTimeout(() => mathWidget.click(), 50);
            return;
          }
        }
      }

      // Closed $$...$$
      const displayMatch = textBefore.match(/\$\$([^]+?)\$\$$/);
      if (displayMatch && displayMatch[1].trim()) {
        const latex = displayMatch[1].trim();
        const block = getCurrentBlock(node.parentNode);
        if (block && block.textContent.trim() === `$$${displayMatch[1]}$$`) {
          replaceNode(block, createMathWidget(latex, true));
        } else {
          const start = textBefore.length - displayMatch[0].length;
          replaceTextInNode(node, start, offset, createMathWidget(latex, true));
        }
        hideMathPreview();
        return;
      }

      // Closed $...$
      const inlineMatch = textBefore.match(/(?<!\$)\$([^$\n]+)\$$/);
      if (inlineMatch && inlineMatch[1].trim()) {
        const latex = inlineMatch[1].trim();
        const start = textBefore.length - inlineMatch[0].length;
        replaceTextInNode(node, start, offset, createMathWidget(latex, false));
        hideMathPreview();
      }
    }

    function createRunnerMarkup() {
      return `
        <div class="code-runner" contenteditable="false" data-language="" data-code="" data-stdin="">
          <div class="code-head">
            <span class="code-lang-badge">auto</span>
            <div class="code-actions">
              <button class="tool code-run" type="button">▶ Run</button>
              <button class="tool code-stdin-btn" type="button" title="Toggle stdin">stdin</button>
              <button class="tool code-remove" type="button">✕</button>
            </div>
          </div>
          <textarea class="code-input" spellcheck="false" autocorrect="off" autocomplete="off" placeholder="Write code…"></textarea>
          <textarea class="code-stdin hidden" spellcheck="false" autocorrect="off" autocomplete="off" placeholder="stdin…"></textarea>
          <div class="code-output">Ready.</div>
          <iframe class="code-preview hidden" sandbox="allow-scripts"></iframe>
        </div>
      `;
    }

    function createCodeRunner() {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = createRunnerMarkup().trim();
      const node = wrapper.firstElementChild;
      hydrateCodeRunner(node);
      return node;
    }

    function detectLanguage(code) {
      const t = code.trim();
      if (!t) return "python";

      // HTML
      if (/<!doctype html>|<html[\s>]|<head[\s>]|<body[\s>]/i.test(t)) return "html";
      if (/^\s*<(div|span|section|article|header|footer|nav|main|form|table|ul|ol|p|h[1-6])[\s>]/i.test(t)) return "html";
      if (/<script[\s>]|<style[\s>]|<link[\s>]/i.test(t) && /<\//.test(t)) return "html";

      // JSON
      if (/^\s*[{\[]/.test(t)) { try { JSON.parse(t); return "json"; } catch {} }

      // C / C++
      if (/^\s*#include\s*[<"]/.test(t)) return /\b(cout|cin|cerr|endl|std::|iostream|vector|string|map|set|template|class\s+\w+|namespace|new |delete |nullptr|auto\s+\w|using\s+namespace|<<|>>)/.test(t) ? "cpp" : "c";
      if (/\b(std::|cout|cin|cerr|endl|nullptr|template\s*<|class\s+\w+\s*[:{]|namespace\s+\w|vector<|map<|string::|unique_ptr|shared_ptr|static_cast|dynamic_cast|reinterpret_cast|const_cast)/.test(t)) return "cpp";
      if (/\bint\s+main\s*\(/.test(t) && /\b(printf|scanf|malloc|free|sizeof|struct\s+\w)/.test(t)) return "c";
      if (/\bint\s+main\s*\(/.test(t)) return "cpp";

      // Rust
      if (/\b(fn\s+main\s*\(|fn\s+\w+\s*\(|use\s+std::|let\s+mut\b|impl\s+\w|pub\s+fn|pub\s+struct|println!|eprintln!|format!|vec!|match\s+\w|Option<|Result<|->\s*\w|::new\(\)|&mut|&self|#\[derive)/.test(t)) return "rust";

      // Go
      if (/^\s*package\s+\w+/m.test(t) && /\bfunc\s+/.test(t)) return "go";
      if (/\bfunc\s+main\s*\(\s*\)/.test(t)) return "go";
      if (/\bfmt\.(Print|Println|Sprintf|Fprintf)/.test(t)) return "go";

      // Java
      if (/^\s*(public\s+)?class\s+\w+/.test(t) && /\b(public\s+static\s+void\s+main|System\.out\.print|String\s*\[\s*\]|import\s+java\.|new\s+\w+\s*\()/.test(t)) return "java";
      if (/^\s*import\s+java\./m.test(t)) return "java";

      // Kotlin
      if (/\bfun\s+main\s*\(/.test(t) || /\bprintln\s*\(/.test(t) && /\b(val |var |fun )/.test(t)) return "kotlin";
      if (/^\s*import\s+kotlin\./m.test(t)) return "kotlin";

      // Swift
      if (/\b(import\s+Foundation|import\s+UIKit|import\s+SwiftUI|let\s+\w+\s*:\s*\w|var\s+\w+\s*:\s*\w|func\s+\w+.*->|guard\s+let|if\s+let|print\s*\()/.test(t) && /\b(let |var |func |struct |class |enum |protocol )/.test(t)) return "swift";

      // C#
      if (/\b(using\s+System|namespace\s+\w|Console\.(Write|ReadLine)|static\s+void\s+Main)/.test(t)) return "csharp";

      // TypeScript
      if (/\b(interface\s+\w+\s*\{|type\s+\w+\s*=|:\s*(string|number|boolean|void|any|unknown|never)\b|<T[>,\s]|as\s+(string|number|any)|enum\s+\w+)/.test(t)) return "typescript";

      // PHP
      if (/^\s*<\?php/m.test(t) || /\$\w+\s*=/.test(t) && /\b(echo|function|class|namespace|use\s+\w)/.test(t)) return "php";

      // Ruby
      if (/\b(puts\s|require\s+['"]|def\s+\w+|class\s+\w+.*\bend\b|attr_(reader|writer|accessor)|do\s*\|)/m.test(t) && /\bend$/m.test(t)) return "ruby";
      if (/^\s*#!.*ruby/m.test(t)) return "ruby";

      // Perl
      if (/^\s*#!.*perl/m.test(t) || /\b(use\s+strict|use\s+warnings|my\s+\$|sub\s+\w+\s*\{|print\s+")/.test(t) && /;\s*$/.test(t)) return "perl";

      // Lua
      if (/\b(local\s+\w|function\s+\w+\s*\(|io\.read|io\.write|print\s*\(|require\s*\(|\bend\b)/m.test(t) && !/\b(def |class |fn |func )/.test(t) && /\bend$/m.test(t)) return "lua";

      // R
      if (/\b(library\s*\(|<-\s*function|data\.frame|ggplot|c\(|print\(|cat\(|paste\(|read\.csv|summary\()/.test(t) && /<-/.test(t)) return "r";

      // Haskell
      if (/^\s*(module\s+\w|import\s+\w|main\s*::\s*IO|putStrLn|data\s+\w+\s*=|type\s+\w+\s*=|class\s+\w+.*where)/m.test(t) && /->/.test(t) && /::/.test(t)) return "haskell";

      // Scala
      if (/\b(object\s+\w+|def\s+main.*Array\[String\]|val\s+\w+\s*:|var\s+\w+\s*:|println\s*\()/m.test(t) && /\b(import\s+scala|object |extends )/.test(t)) return "scala";

      // Bash / Shell
      if (/^\s*#!\s*\/bin\/(bash|sh|zsh)/m.test(t)) return "bash";
      if (/^\s*(echo\s|export\s|alias\s|if\s+\[|for\s+\w+\s+in|while\s+\[|\$\(|\$\{)/m.test(t) && !/\b(function |const |let |var |=>)/.test(t)) return "bash";

      // SQL
      if (/^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP|WITH)\s/im.test(t) && /\b(FROM|WHERE|TABLE|INTO|SET|VALUES)\b/i.test(t)) return "sql";

      // Python (broad)
      if (/\b(def\s+\w+\s*\(|import\s+\w|from\s+\w+\s+import|print\s*\(|elif\s|lambda\s|class\s+\w+.*:|async\s+def|await\s|__\w+__|self\.|raise\s|except\s|with\s+open)/m.test(t)) return "python";
      if (/^\s*(#.*\n)*(import |from )/.test(t)) return "python";

      // JavaScript (broad)
      if (/\b(function\s|const\s|let\s|var\s|=>|console\.(log|error|warn)|document\.|window\.|require\s*\(|module\.exports|export\s+(default|const|function)|async\s+function)/.test(t)) return "javascript";

      return "python";
    }

    function ensurePyodide() {
      if (pyodideRuntime) return Promise.resolve(pyodideRuntime);
      if (pyodideLoader) return pyodideLoader;
      pyodideLoader = new Promise((resolve, reject) => {
        const finish = async () => {
          try {
            const py = await window.loadPyodide({ indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.3/full/" });
            // Load micropip package first, then install libraries
            await py.loadPackage("micropip");
            await py.runPythonAsync(`
import micropip
await micropip.install(["rich", "numpy", "matplotlib", "sympy"])
`);
            pyodideRuntime = py;
            resolve(py);
          } catch (err) { reject(err); }
        };
        if (window.loadPyodide) { finish(); return; }
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/pyodide/v0.27.3/full/pyodide.js";
        script.onload = finish;
        script.onerror = () => reject(new Error("Failed to load Python runtime"));
        document.head.appendChild(script);
      });
      return pyodideLoader;
    }

    async function runPython(code, stdin) {
      const pyodide = await ensurePyodide();
      try { await pyodide.loadPackagesFromImports(code); } catch {}
      pyodide.globals.set("user_code", code);
      pyodide.globals.set("user_stdin", stdin || "");
      return JSON.parse(await pyodide.runPythonAsync(`
import io, traceback, contextlib, builtins, json, base64
buffer = io.StringIO()
figures = []
stdin_it = iter(user_stdin.splitlines())
_orig_input = builtins.input
builtins.input = lambda _p="": next(stdin_it, "")
try:
    import matplotlib; matplotlib.use("Agg")
    import matplotlib.pyplot as plt
    def _show(*a, **k):
        buf = io.BytesIO()
        plt.savefig(buf, format="png", bbox_inches="tight", dpi=120)
        buf.seek(0); figures.append(base64.b64encode(buf.read()).decode())
        plt.clf(); plt.close()
    plt.show = _show
except Exception: pass
scope = {}
try:
    with contextlib.redirect_stdout(buffer):
        exec(user_code, scope)
except ModuleNotFoundError as _me:
    _mod = str(_me).split("'")[1] if "'" in str(_me) else ""
    if _mod:
        import micropip
        await micropip.install([_mod])
        try:
            with contextlib.redirect_stdout(buffer):
                exec(user_code, scope)
        except Exception: buffer.write(traceback.format_exc())
    else: buffer.write(traceback.format_exc())
except Exception: buffer.write(traceback.format_exc())
builtins.input = _orig_input
try:
    import matplotlib.pyplot as _plt
    if _plt.get_fignums():
        buf = io.BytesIO(); _plt.savefig(buf, format="png", bbox_inches="tight", dpi=120)
        buf.seek(0); figures.append(base64.b64encode(buf.read()).decode())
        _plt.clf(); _plt.close("all")
except Exception: pass
json.dumps({"text": buffer.getvalue(), "images": figures})
`));
    }

    function runJavaScript(code, widget) {
      const iframe = widget.querySelector(".code-preview");
      const output = widget.querySelector(".code-output");
      iframe.classList.add("hidden");
      output.classList.remove("hidden");
      const frameHtml = `<!DOCTYPE html><html><body><script>
const send = (t,p) => parent.postMessage({quickNoteRunner:true,t,p},'*');
const lines = [];
console.log = (...a) => lines.push(a.map(String).join(' '));
window.onerror = (m) => send('e', m);
try {
  const r = (() => { ${code}\n })();
  if (typeof r !== 'undefined') lines.push(String(r));
  send('r', lines.join('\\n') || 'Done (no output).');
} catch(e) { send('e', e.stack||e.message); }
<\/script></body></html>`;
      iframe.srcdoc = frameHtml;
      output.textContent = "Running…";
    }

    const wandboxCompilers = {
      c: "gcc-head", cpp: "gcc-head", java: "openjdk-head",
      rust: "rust-head", go: "go-head", ruby: "ruby-head",
      bash: "bash", kotlin: "kotlin-head", r: "r-head",
      csharp: "mono-head", swift: "swift-head", scala: "scala-head",
      perl: "perl-head", lua: "lua-head", haskell: "ghc-head",
      php: "php-head", typescript: "typescript-head", sql: "sqlite-head",
    };

    async function runWithWandbox(language, code, stdin) {
      const compiler = wandboxCompilers[language];
      if (!compiler) throw new Error(`No runner for "${language}"`);
      const res = await fetch("https://wandbox.org/api/compile.json", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ compiler, code, stdin: stdin || "" }),
      });
      if (!res.ok) throw new Error(`Compiler API error: ${res.status}`);
      const data = await res.json();
      const out = [data.program_output, data.program_error, data.compiler_error]
        .filter(Boolean).join("\n").trim();
      return out || "Done (no output).";
    }

    function ansiToHtml(raw) {
      const escaped = raw.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      let opens = 0;
      const FG  = ['#111','#c0392b','#27ae60','#e67e22','#2980b9','#8e44ad','#16a085','#bbb'];
      const FGB = ['#555','#e74c3c','#2ecc71','#f1c40f','#3498db','#9b59b6','#1abc9c','#fff'];
      const result = escaped.replace(/\x1b\[([0-9;]*)m/g, (_, p) => {
        const codes = p ? p.split(';').map(Number) : [0];
        if (!codes.length || codes[0] === 0) { const c = '</span>'.repeat(opens); opens = 0; return c; }
        const styles = [];
        for (let i = 0; i < codes.length; i++) {
          const c = codes[i];
          if (c === 1) styles.push('font-weight:bold');
          else if (c === 2) styles.push('opacity:0.6');
          else if (c === 3) styles.push('font-style:italic');
          else if (c === 4) styles.push('text-decoration:underline');
          else if (c >= 30 && c <= 37) styles.push(`color:${FG[c-30]}`);
          else if (c >= 90 && c <= 97) styles.push(`color:${FGB[c-90]}`);
          else if (c >= 40 && c <= 47) styles.push(`background:${FG[c-40]};padding:0 2px`);
          else if (c >= 100 && c <= 107) styles.push(`background:${FGB[c-100]};padding:0 2px`);
          else if (c === 38 && codes[i+1] === 2 && i+4 < codes.length) {
            styles.push(`color:rgb(${codes[i+2]},${codes[i+3]},${codes[i+4]})`); i+=4;
          } else if (c === 48 && codes[i+1] === 2 && i+4 < codes.length) {
            styles.push(`background:rgb(${codes[i+2]},${codes[i+3]},${codes[i+4]});padding:0 2px`); i+=4;
          }
        }
        if (!styles.length) return '';
        opens++;
        return `<span style="${styles.join(';')}">` ;
      });
      return result + '</span>'.repeat(opens);
    }

    function renderPythonOutput(output, result) {
      const { text = "", images = [] } = result;
      let html = '';
      if (text.trim()) html += ansiToHtml(text);
      for (const b64 of images) {
        html += `${html ? '\n' : ''}<img src="data:image/png;base64,${b64}" style="max-width:100%;display:block;border-radius:4px;margin:4px 0;">`;
      }
      output.innerHTML = html || 'Done (no output).';
    }

    function runHtml(code, widget) {
      const iframe = widget.querySelector(".code-preview");
      const output = widget.querySelector(".code-output");
      output.classList.add("hidden");
      iframe.classList.remove("hidden");
      iframe.srcdoc = code;
    }

    async function executeCodeWidget(widget) {
      const codeInput = widget.querySelector(".code-input");
      const stdinInput = widget.querySelector(".code-stdin");
      const output = widget.querySelector(".code-output");
      const preview = widget.querySelector(".code-preview");
      const langBadge = widget.querySelector(".code-lang-badge");
      const code = codeInput ? codeInput.value : "";
      const stdin = stdinInput ? stdinInput.value : "";
      const language = detectLanguage(code);

      widget.dataset.language = language;
      if (langBadge) langBadge.textContent = language;
      if (codeInput) widget.dataset.code = codeInput.value;
      if (stdinInput) widget.dataset.stdin = stdinInput.value;

      if (!code.trim()) {
        output.textContent = "Ready.";
        output.classList.remove("hidden");
        preview.classList.add("hidden");
        return;
      }

      if (language === "html") {
        runHtml(code, widget);
        return;
      }

      output.classList.remove("hidden");
      preview.classList.add("hidden");
      output.textContent = "Running…";

      try {
        if (language === "javascript") {
          runJavaScript(code, widget);
          return;
        }
        if (language === "python") {
          output.textContent = pyodideRuntime ? "Running…" : "Loading Python runtime (first run)…";
          renderPythonOutput(output, await runPython(code, stdin));
          return;
        }
        output.textContent = await runWithWandbox(language, code, stdin);
      } catch (error) {
        output.textContent = "Error: " + error.message;
      }
    }

    function hydrateCodeRunner(widget) {
      const codeInput = widget.querySelector(".code-input");
      const stdinInput = widget.querySelector(".code-stdin");
      const runButton = widget.querySelector(".code-run");
      const removeButton = widget.querySelector(".code-remove");
      const stdinToggle = widget.querySelector(".code-stdin-btn");

      if (!codeInput) return;

      if (widget.dataset.hydrated === "true") {
        if (codeInput && widget.dataset.code) {
          codeInput.value = widget.dataset.code;
        }
        if (stdinInput && widget.dataset.stdin) {
          stdinInput.value = widget.dataset.stdin;
        }
        // Re-bind remove even on already-hydrated widgets
        if (removeButton && !removeButton.dataset.bound) {
          removeButton.dataset.bound = "true";
          removeButton.addEventListener("click", (e) => {
            e.stopPropagation();
            showCodeDeleteConfirm(widget);
          });
        }
        return;
      }

      codeInput.value = widget.dataset.code || codeInput.textContent || "";
      widget.dataset.code = codeInput.value;
      if (stdinInput) {
        stdinInput.value = widget.dataset.stdin || "";
      }
      widget.dataset.hydrated = "true";

      // Update lang badge on input
      const langBadge = widget.querySelector(".code-lang-badge");
      codeInput.addEventListener("input", () => {
        widget.dataset.code = codeInput.value;
        if (langBadge) langBadge.textContent = detectLanguage(codeInput.value) || "auto";
        queueSave();
      });

      if (stdinInput) {
        stdinInput.addEventListener("input", () => {
          widget.dataset.stdin = stdinInput.value;
          queueSave();
        });
      }

      if (stdinToggle && stdinInput) {
        stdinToggle.addEventListener("click", () => {
          stdinInput.classList.toggle("hidden");
          stdinToggle.classList.toggle("active");
        });
      }

      runButton.addEventListener("click", () => executeCodeWidget(widget));
      if (removeButton) {
        removeButton.dataset.bound = "true";
        removeButton.addEventListener("click", (e) => {
          e.stopPropagation();
          showCodeDeleteConfirm(widget);
        });
      }
    }

    // ── Code block delete confirmation ────────────────────────────────
    const codeDeleteConfirm = document.getElementById("codeDeleteConfirm");
    let pendingDeleteWidget = null;

    function showCodeDeleteConfirm(widget) {
      pendingDeleteWidget = widget;
      const rect = widget.getBoundingClientRect();
      codeDeleteConfirm.style.top = Math.min(rect.top + 40, window.innerHeight - 120) + "px";
      codeDeleteConfirm.style.left = Math.min(Math.max(8, rect.right - 300), window.innerWidth - 310) + "px";
      codeDeleteConfirm.removeAttribute("hidden");
    }

    function closeCodeDeleteConfirm() {
      codeDeleteConfirm.setAttribute("hidden", "");
      pendingDeleteWidget = null;
    }

    document.getElementById("codeDeleteYes").addEventListener("click", () => {
      if (pendingDeleteWidget) {
        pendingDeleteWidget.remove();
        queueSave();
        updateMetrics();
        focusEditor();
      }
      closeCodeDeleteConfirm();
    });

    document.getElementById("codeDeleteNo").addEventListener("click", closeCodeDeleteConfirm);

    document.addEventListener("click", e => {
      if (!codeDeleteConfirm.hasAttribute("hidden") &&
          !codeDeleteConfirm.contains(e.target) &&
          !e.target.classList.contains("code-remove")) {
        closeCodeDeleteConfirm();
      }
    }, true);

    function handleSmartShortcuts(event) {
      if (event.isComposing) {
        return;
      }

      if ((event.key.length === 1 || event.key === "Backspace" || event.key === "Delete") && !autocorrectBoundaryKeys.has(event.key)) {
        cancelScheduledAutocorrect();
      }

      if (autocorrectBoundaryKeys.has(event.key)) {
        scheduleAutocorrect();
      }
    }

    function importDocumentHtml(content, isHtml) {
      if (isHtml) {
        const parser = new DOMParser();
        const documentNode = parser.parseFromString(content, "text/html");
        editor.innerHTML = documentNode.body.innerHTML || "<p><br></p>";
      } else {
        editor.innerHTML = content
          .split(/\n{2,}/)
          .map((paragraph) => `<p>${paragraph.replace(/\n/g, "<br>")}</p>`)
          .join("") || "<p><br></p>";
      }
      hydrateRichBlocks();
      updateMetrics();
      saveDocument();
    }

    window.addEventListener("message", (event) => {
      if (!event.data || !event.data.quickNoteRunner) return;
      const widgets = [...editor.querySelectorAll(".code-runner")];
      const active = widgets.find((w) => w.querySelector(".code-output").textContent === "Running…") || widgets[widgets.length - 1];
      if (!active) return;
      const output = active.querySelector(".code-output");
      if (event.data.t === "r") output.textContent = event.data.p || "Done (no output).";
      if (event.data.t === "e") output.textContent = event.data.p || "Error.";
    });

    commandButtons.forEach((button) => {
      button.addEventListener("click", () => runCommand(button.dataset.command));
    });

    blockStyle.addEventListener("change", () => {
      runCommand("formatBlock", `<${blockStyle.value}>`);
    });

    textColor.addEventListener("input", () => runCommand("foreColor", textColor.value));
    highlightColor.addEventListener("input", () => applyHighlight(highlightColor.value));

    document.getElementById("clearFormat").addEventListener("click", () => runCommand("removeFormat"));

    // ── Link preview tooltip ──────────────────────────────────────────
    const linkPreview = document.getElementById("linkPreview");
    const linkPreviewUrl = document.getElementById("linkPreviewUrl");
    const linkPreviewFrame = document.getElementById("linkPreviewFrame");
    let linkPreviewAnchor = null;

    function showLinkPreview(anchor) {
      const href = anchor.getAttribute("href") || "";
      if (!href || href === "#") return;
      linkPreviewAnchor = anchor;
      linkPreviewUrl.textContent = href;
      linkPreviewUrl.title = href;
      // Load preview in iframe
      try {
        const url = new URL(href, window.location.href);
        linkPreviewFrame.src = url.href;
      } catch {
        linkPreviewFrame.src = "";
      }
      const rect = anchor.getBoundingClientRect();
      linkPreview.style.top = (rect.bottom + 6) + "px";
      linkPreview.style.left = Math.min(Math.max(8, rect.left), window.innerWidth - 360) + "px";
      linkPreview.removeAttribute("hidden");
    }

    function closeLinkPreview() {
      linkPreview.setAttribute("hidden", "");
      linkPreviewFrame.src = "";
      linkPreviewAnchor = null;
    }

    document.getElementById("linkPreviewOpen").addEventListener("click", () => {
      if (linkPreviewAnchor) window.open(linkPreviewAnchor.href, "_blank", "noopener,noreferrer");
      closeLinkPreview();
    });

    document.getElementById("linkPreviewEdit").addEventListener("click", () => {
      const anchor = linkPreviewAnchor;
      closeLinkPreview();
      if (anchor) {
        const range = document.createRange();
        range.selectNode(anchor);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        linkSavedRange = range.cloneRange();
        showLinkPopup(anchor);
      }
    });

    document.getElementById("linkPreviewCopy").addEventListener("click", () => {
      if (linkPreviewAnchor) {
        navigator.clipboard.writeText(linkPreviewAnchor.href).then(() => {
          const btn = document.getElementById("linkPreviewCopy");
          btn.textContent = "Copied!";
          setTimeout(() => btn.textContent = "Copy URL", 1200);
        });
      }
    });

    document.getElementById("linkPreviewClose").addEventListener("click", closeLinkPreview);

    // Close preview when clicking outside
    document.addEventListener("click", e => {
      if (!linkPreview.hasAttribute("hidden") &&
          !linkPreview.contains(e.target) &&
          !e.target.closest("a")) {
        closeLinkPreview();
      }
    }, true);

    // ── Link popup ──────────────────────────────────────────────────────
    let linkSavedRange = null;
    const linkPopup = document.getElementById("linkPopup");
    const linkUrlInput = document.getElementById("linkUrl");
    const linkTextInput = document.getElementById("linkDisplayText");

    function showLinkPopup(anchor) {
      if (anchor) {
        linkUrlInput.value = anchor.getAttribute("href") || "";
        linkTextInput.value = anchor.textContent || "";
      } else {
        const sel = window.getSelection();
        linkUrlInput.value = "https://";
        linkTextInput.value = sel ? sel.toString() : "";
      }
      const btn = document.getElementById("insertLink");
      const rect = btn.getBoundingClientRect();
      linkPopup.style.top  = (rect.bottom + 8) + "px";
      linkPopup.style.left = Math.min(rect.left, window.innerWidth - 320) + "px";
      linkPopup.removeAttribute("hidden");
      linkUrlInput.focus();
      linkUrlInput.select();
    }

    function closeLinkPopup() {
      linkPopup.setAttribute("hidden", "");
      linkSavedRange = null;
    }

    function restoreSelectionAndFocus() {
      editor.focus();
      if (linkSavedRange) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(linkSavedRange);
      }
    }

    document.getElementById("insertLink").addEventListener("click", () => {
      const sel = window.getSelection();
      if (sel && sel.rangeCount > 0) linkSavedRange = sel.getRangeAt(0).cloneRange();
      const node = sel && sel.anchorNode;
      const anchor = node
        ? (node.nodeType === 1 ? node.closest("a") : node.parentElement && node.parentElement.closest("a"))
        : null;
      showLinkPopup(anchor || null);
    });

    document.getElementById("linkConfirm").addEventListener("click", () => {
      let url = linkUrlInput.value.trim();
      if (!url || url === "https://") { closeLinkPopup(); return; }
      // Security: reject javascript: URIs
      if (/^javascript:/i.test(url)) { closeLinkPopup(); return; }
      // Auto-prepend https:// if no scheme
      if (!/^[a-z][a-z0-9+\-.]*:/i.test(url) && !url.startsWith("/") && !url.startsWith("#")) {
        url = "https://" + url;
      }
      const displayText = linkTextInput.value.trim();
      restoreSelectionAndFocus();
      const sel = window.getSelection();
      const selText = displayText || (sel ? sel.toString() : "") || url;
      const safeHref = url.replace(/"/g, "%22");
      const safeText = selText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      document.execCommand("insertHTML", false,
        `<a href="${safeHref}" target="_blank" rel="noopener noreferrer">${safeText}</a>`);
      closeLinkPopup();
    });

    document.getElementById("linkRemove").addEventListener("click", () => {
      restoreSelectionAndFocus();
      document.execCommand("unlink");
      closeLinkPopup();
    });

    document.getElementById("linkCancel").addEventListener("click", closeLinkPopup);

    linkUrlInput.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("linkConfirm").click();
      if (e.key === "Escape") closeLinkPopup();
    });
    linkTextInput.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("linkConfirm").click();
      if (e.key === "Escape") closeLinkPopup();
    });

    // Click on existing link in editor: show redirect confirmation
    editor.addEventListener("click", e => {
      const anchor = e.target.closest("a");
      if (!anchor) return;
      e.preventDefault();
      closeLinkPopup();
      closeLinkPreview();
      showRedirectConfirm(anchor);
    });

    // Hover on link in editor: show preview tooltip
    let linkHoverTimer = null;
    editor.addEventListener("mouseover", e => {
      const anchor = e.target.closest("a");
      if (!anchor || !anchor.href) return;
      clearTimeout(linkHoverTimer);
      linkHoverTimer = setTimeout(() => showLinkPreview(anchor), 300);
    });
    editor.addEventListener("mouseout", e => {
      const anchor = e.target.closest("a");
      if (!anchor) return;
      clearTimeout(linkHoverTimer);
      // Close preview after a short delay (let user move to preview)
      linkHoverTimer = setTimeout(() => {
        if (!linkPreview.matches(":hover")) closeLinkPreview();
      }, 400);
    });
    linkPreview.addEventListener("mouseleave", () => {
      linkHoverTimer = setTimeout(closeLinkPreview, 300);
    });
    linkPreview.addEventListener("mouseenter", () => {
      clearTimeout(linkHoverTimer);
    });

    // ── Redirect confirmation popup ─────────────────────────────────
    const linkRedirect = document.getElementById("linkRedirect");
    const linkRedirectUrl = document.getElementById("linkRedirectUrl");
    let pendingRedirectHref = null;

    function showRedirectConfirm(anchor) {
      const href = anchor.getAttribute("href") || "";
      if (!href || href === "#") return;
      // Reject javascript: URIs
      if (/^javascript:/i.test(href)) return;
      pendingRedirectHref = href;
      let displayUrl;
      try { displayUrl = new URL(href, window.location.href).hostname; } catch { displayUrl = href; }
      linkRedirectUrl.textContent = href;
      linkRedirectUrl.href = href;
      document.getElementById("linkRedirectMsg").textContent = `This will redirect you to ${displayUrl}`;
      const rect = anchor.getBoundingClientRect();
      linkRedirect.style.top = (rect.bottom + 8) + "px";
      linkRedirect.style.left = Math.min(Math.max(8, rect.left - 60), window.innerWidth - 400) + "px";
      linkRedirect.removeAttribute("hidden");
    }

    function closeRedirectConfirm() {
      linkRedirect.setAttribute("hidden", "");
      pendingRedirectHref = null;
    }

    document.getElementById("linkRedirectYes").addEventListener("click", () => {
      if (pendingRedirectHref) window.open(pendingRedirectHref, "_blank", "noopener,noreferrer");
      closeRedirectConfirm();
    });

    document.getElementById("linkRedirectNo").addEventListener("click", closeRedirectConfirm);

    document.addEventListener("click", e => {
      if (!linkRedirect.hasAttribute("hidden") &&
          !linkRedirect.contains(e.target) &&
          !e.target.closest("a")) {
        closeRedirectConfirm();
      }
    }, true);

    // ── Auto-linkify typed URLs ─────────────────────────────────────
    const URL_REGEX = /(?:https?:\/\/|www\.)[^\s<>"']+/gi;

    function autoLinkify() {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      const focusNode = sel.focusNode;
      if (!focusNode || focusNode.nodeType !== 3) return;
      if (!editor.contains(focusNode)) return;
      // Don't linkify inside existing anchors
      if (focusNode.parentElement && focusNode.parentElement.closest("a")) return;

      const text = focusNode.textContent;
      const matches = [...text.matchAll(URL_REGEX)];
      if (!matches.length) return;

      // Process last match (most recently typed)
      for (let i = matches.length - 1; i >= 0; i--) {
        const m = matches[i];
        let url = m[0];
        const start = m.index;
        const end = start + url.length;

        // Make sure it's a complete token (followed by space/end)
        if (end < text.length && !/\s/.test(text[end])) continue;

        let href = url;
        if (!/^https?:\/\//i.test(href)) href = "https://" + href;

        const range = document.createRange();
        range.setStart(focusNode, start);
        range.setEnd(focusNode, end);
        sel.removeAllRanges();
        sel.addRange(range);
        const safeHref = href.replace(/"/g, "%22");
        const safeText = url.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        document.execCommand("insertHTML", false,
          `<a href="${safeHref}" target="_blank" rel="noopener noreferrer">${safeText}</a>&nbsp;`);
        break;
      }
    }

    editor.addEventListener("input", (() => {
      let timer = null;
      return (e) => {
        if (e.inputType === "insertParagraph" || (e.inputType === "insertText" && (e.data === " " || e.data === null))) {
          clearTimeout(timer);
          timer = setTimeout(autoLinkify, 0);
        }
      };
    })());

    // Close popup when clicking outside
    document.addEventListener("click", e => {
      if (!linkPopup.hasAttribute("hidden") &&
          !linkPopup.contains(e.target) &&
          e.target.id !== "insertLink") {
        closeLinkPopup();
      }
    }, true);

    function setSidebar(open) {
      notesPanel.classList.toggle("open", open);
      toggleNotes.setAttribute("aria-expanded", String(open));
      document.documentElement.style.setProperty("--sidebar-w", open ? "260px" : "0px");
    }

    toggleNotes.addEventListener("click", () => {
      setSidebar(!notesPanel.classList.contains("open"));
    });

    document.getElementById("closeSidebar").addEventListener("click", () => {
      setSidebar(false);
    });

    createNoteButton.addEventListener("click", () => createNote());

    // ── Export menu ────────────────────────────────────────────────────
    const exportMenu = document.getElementById("exportMenu");
    document.getElementById("exportToggle").addEventListener("click", (e) => {
      e.stopPropagation();
      const willOpen = exportMenu.hasAttribute("hidden");
      exportMenu.toggleAttribute("hidden", !willOpen);
    });
    document.addEventListener("click", (e) => {
      if (!exportMenu.hasAttribute("hidden") && !exportMenu.contains(e.target)) {
        exportMenu.setAttribute("hidden", "");
      }
    });

    document.getElementById("exportPdf").addEventListener("click", () => {
      exportMenu.setAttribute("hidden", "");
      window.print();
    });

    document.getElementById("saveHtml").addEventListener("click", () => {
      exportMenu.setAttribute("hidden", "");
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${currentTitle()}</title></head><body>${serializeEditorHTML()}</body></html>`;
      downloadFile(html, "html", "text/html;charset=utf-8");
    });

    // ── Draggable margin guides ──────────────────────────────────────────
    (function initMarginGuides() {
      const pageEl = editor;
      const leftGuide = document.getElementById("marginGuideLeft");
      const rightGuide = document.getElementById("marginGuideRight");
      const MIN_PAD = 0;
      const MAX_PAD = 600;

      function positionGuides() {
        const pad = parseFloat(getComputedStyle(pageEl).paddingLeft);
        leftGuide.style.left = (pad - 2) + "px";
        rightGuide.style.right = (pad - 2) + "px";
      }

      function setupDrag(guide, side) {
        let startX, startPad;
        function onDown(e) {
          e.preventDefault();
          guide.classList.add("dragging");
          startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
          startPad = parseFloat(getComputedStyle(pageEl).paddingLeft);
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
          document.addEventListener("touchmove", onMove, { passive: false });
          document.addEventListener("touchend", onUp);
        }
        function onMove(e) {
          e.preventDefault();
          const clientX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
          const delta = side === "left"
            ? clientX - startX
            : startX - clientX;
          const newPad = Math.max(MIN_PAD, Math.min(MAX_PAD, startPad + delta));
          document.documentElement.style.setProperty("--page-hpad", newPad + "px");
          positionGuides();
        }
        function onUp() {
          guide.classList.remove("dragging");
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
          document.removeEventListener("touchmove", onMove);
          document.removeEventListener("touchend", onUp);
          // Update print margin proportionally
          const currentPad = parseFloat(getComputedStyle(pageEl).paddingLeft);
          const printIn = Math.max(0.25, currentPad / 96).toFixed(2);
          document.getElementById("printMargin").textContent = `@page { margin: ${printIn}in; }`;
        }
        guide.addEventListener("mousedown", onDown);
        guide.addEventListener("touchstart", onDown, { passive: false });
      }

      setupDrag(leftGuide, "left");
      setupDrag(rightGuide, "right");
      positionGuides();
    })();

    document.getElementById("saveText").addEventListener("click", () => {
      exportMenu.setAttribute("hidden", "");
      downloadFile(editor.innerText, "txt", "text/plain;charset=utf-8");
    });

    // ── Grammar / Writing menu ─────────────────────────────────────────
    const grammarMenu = document.getElementById("grammarMenu");
    const optAutocorrect = document.getElementById("optAutocorrect");
    const optSpellcheck = document.getElementById("optSpellcheck");
    const optAutocap = document.getElementById("optAutocap");

    optAutocorrect.checked = writingPrefs.autocorrect;
    optSpellcheck.checked = writingPrefs.spellcheck;
    optAutocap.checked = writingPrefs.autocapitalize;

    document.getElementById("grammarToggle").addEventListener("click", (e) => {
      e.stopPropagation();
      grammarMenu.toggleAttribute("hidden");
    });
    document.addEventListener("click", (e) => {
      if (!grammarMenu.hasAttribute("hidden") && !grammarMenu.contains(e.target)) {
        grammarMenu.setAttribute("hidden", "");
      }
    });
    optAutocorrect.addEventListener("change", () => {
      writingPrefs.autocorrect = optAutocorrect.checked;
      saveWritingPrefs();
    });
    optSpellcheck.addEventListener("change", () => {
      writingPrefs.spellcheck = optSpellcheck.checked;
      saveWritingPrefs();
      if (!writingPrefs.spellcheck) clearSpellHighlights();
      else scheduleSpellCheck();
    });
    optAutocap.addEventListener("change", () => {
      writingPrefs.autocapitalize = optAutocap.checked;
      saveWritingPrefs();
    });

    // ── Spell check highlighting ───────────────────────────────────────
    let spellCheckTimer = null;
    function scheduleSpellCheck() {
      clearTimeout(spellCheckTimer);
      spellCheckTimer = setTimeout(runSpellCheck, 800);
    }

    function clearSpellHighlights() {
      editor.querySelectorAll(".spell-error").forEach(el => {
        const parent = el.parentNode;
        while (el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
        parent.normalize();
      });
    }

    async function runSpellCheck() {
      if (!writingPrefs.spellcheck) return;
      const dictionary = await loadSpellDictionary();
      if (!dictionary) return;

      // Save and restore selection
      const sel = window.getSelection();
      let savedRange = null;
      if (sel && sel.rangeCount) savedRange = sel.getRangeAt(0).cloneRange();

      clearSpellHighlights();

      const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (getEditingContainer(node.parentNode)) return NodeFilter.FILTER_REJECT;
          if (node.parentElement && node.parentElement.closest(".spell-error")) return NodeFilter.FILTER_REJECT;
          if (node.parentElement && node.parentElement.closest("a")) return NodeFilter.FILTER_REJECT;
          return NodeFilter.FILTER_ACCEPT;
        }
      });

      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);

      const wordRe = /\b([A-Za-z][A-Za-z'''-]{1,})\b/g;
      for (const tNode of textNodes) {
        const text = tNode.nodeValue;
        if (!text) continue;
        const matches = [...text.matchAll(wordRe)];
        if (!matches.length) continue;

        let offset = 0;
        let currentNode = tNode;
        for (const m of matches) {
          const word = m[1].replace(/['''-]+$/g, "");
          if (word.length < 2) continue;
          if (autocorrectOverrides[word.toLowerCase()]) continue;
          if (dictionary.check(word) || dictionary.check(word.toLowerCase())) continue;

          const idx = m.index - offset;
          if (idx < 0 || idx + word.length > currentNode.nodeValue.length) continue;

          const before = currentNode.nodeValue.slice(0, idx);
          const after = currentNode.nodeValue.slice(idx + word.length);

          const span = document.createElement("span");
          span.className = "spell-error";
          span.textContent = word;

          const afterNode = document.createTextNode(after);
          currentNode.nodeValue = before;
          currentNode.parentNode.insertBefore(span, currentNode.nextSibling);
          currentNode.parentNode.insertBefore(afterNode, span.nextSibling);

          currentNode = afterNode;
          offset = m.index + word.length;
        }
      }

      // Restore selection
      if (savedRange && sel) {
        try {
          sel.removeAllRanges();
          sel.addRange(savedRange);
        } catch {}
      }
    }

    // ── Auto-capitalize ────────────────────────────────────────────────
    function autoCap(e) {
      if (!writingPrefs.autocapitalize) return;
      if (e.inputType !== "insertText" || !e.data || e.data.length !== 1) return;
      const ch = e.data;
      if (!/[a-z]/.test(ch)) return;

      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      const node = sel.anchorNode;
      if (!node || node.nodeType !== Node.TEXT_NODE) return;
      if (!editor.contains(node)) return;
      if (getEditingContainer(node.parentNode)) return;

      const offset = sel.anchorOffset;
      const textBefore = node.nodeValue.slice(0, offset);

      // Capitalize after sentence-ending punctuation or start of block
      const block = getCurrentBlock(node.parentNode);
      const fullBlockText = block ? block.textContent : "";
      const posInBlock = fullBlockText.lastIndexOf(textBefore.slice(-20));
      const relevantBefore = posInBlock >= 0 ? fullBlockText.slice(0, posInBlock + textBefore.length) : textBefore;

      // Check if this is start of block or after sentence ender
      const trimmed = relevantBefore.slice(0, -1).trimEnd();
      if (trimmed.length === 0 || /[.!?]\s*$/.test(trimmed)) {
        const upper = ch.toUpperCase();
        const r = document.createRange();
        r.setStart(node, offset - 1);
        r.setEnd(node, offset);
        sel.removeAllRanges();
        sel.addRange(r);
        document.execCommand("insertText", false, upper);
      }
    }

    document.getElementById("loadDocument").addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async () => {
      const [file] = fileInput.files;
      if (!file) {
        return;
      }

      const content = await file.text();
      importDocumentHtml(content, file.name.match(/\.html?$/i));
      announce("Imported");
      fileInput.value = "";
    });

    document.getElementById("findNext").addEventListener("click", () => {
      focusEditor();
      if (!findText.value.trim()) {
        announce("Enter search text");
        return;
      }
      const found = window.find(findText.value, false, false, true, false, false, false);
      announce(found ? "Match found" : "No match");
      updateMetrics();
    });

    document.getElementById("replaceAll").addEventListener("click", () => {
      const count = replaceAllText(findText.value, replaceText.value);
      if (count) {
        updateMetrics();
        queueSave();
      }
      announce(count ? `Replaced ${count}` : "No matches");
    });

    editor.addEventListener("keydown", handleSmartShortcuts);

    editor.addEventListener("input", (e) => {
      updateMetrics();
      queueSave();
      checkAndRenderMath();
      updateMathPreview();
      scheduleSpellCheck();
      autoCap(e);

      // Convert empty headings to plain paragraphs
      const sel = window.getSelection();
      if (sel && sel.rangeCount) {
        const node = sel.anchorNode;
        const block = node && (node.nodeType === 1 ? node : node.parentElement);
        if (block && /^H[1-6]$/.test(block.nodeName) && editor.contains(block)) {
          const text = block.textContent.replace(/\u00a0/g, "").trim();
          if (!text) {
            const p = document.createElement("p");
            p.innerHTML = "<br>";
            block.replaceWith(p);
            const r = document.createRange();
            r.setStart(p, 0);
            r.collapse(true);
            sel.removeAllRanges();
            sel.addRange(r);
          }
        }
      }

      if (e.data === " ") {
        const range = getActiveRange();
        if (range && range.collapsed) {
          const block = getCurrentBlock(
            range.startContainer.nodeType === Node.TEXT_NODE
              ? range.startContainer.parentNode
              : range.startContainer
          );
          if (!block) return;
          const text = block.textContent;

          // \code → code runner
          if (text.trimEnd() === codeWidgetTrigger) {
            const runner = createCodeRunner();
            replaceNode(block, runner);
            const codeInput = runner.querySelector(".code-input");
            if (codeInput) codeInput.focus();
            return;
          }

          // * or - → bullet list
          if (/^[*\-]\s$/.test(text)) {
            document.execCommand("insertUnorderedList");
            const sel = window.getSelection();
            if (sel && sel.rangeCount) {
              const li = sel.getRangeAt(0).startContainer;
              const textNode = li.nodeType === Node.TEXT_NODE ? li : li.firstChild;
              if (textNode && textNode.nodeType === Node.TEXT_NODE) {
                textNode.nodeValue = textNode.nodeValue.replace(/^[*\-]\s/, "");
              }
            }
            queueSave();
          }
        }
      }
    });

    editor.addEventListener("blur", hideMathPreview);

    editor.addEventListener("keyup", updateToolbarState);
    editor.addEventListener("mouseup", updateToolbarState);

    document.addEventListener("selectionchange", () => {
      const selection = window.getSelection();
      if (!selection || !selection.anchorNode) {
        return;
      }

      if (document.activeElement === editor || editor.contains(document.activeElement) || editor.contains(selection.anchorNode)) {
        updateMetrics();
        updateToolbarState();
      }
    });

    document.addEventListener("keydown", (event) => {
      const mod = event.ctrlKey || event.metaKey;
      if (!mod) {
        return;
      }

      const key = event.key.toLowerCase();

      if (key === "s") {
        event.preventDefault();
        document.getElementById("saveHtml").click();
      }

      if (key === "f") {
        event.preventDefault();
        findText.focus();
        findText.select();
      }

      if (key === "Escape") {
        hideMathPreview();
      }
    });

    loadSavedDocument();
    runWhenIdle(() => loadSpellDictionary(), 2000);
    updateMetrics();
    updateToolbarState();
    focusEditor();
  </script>
</body>
</html>
